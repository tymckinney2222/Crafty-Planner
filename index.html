<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c4956a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Crafty Planner">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Crafty Planner — Small Business Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg: #f5f0eb; --bg2: #ede5da; --card: #fff; --card-hover: #faf7f3; --sidebar-bg: #3d2e1f; --sidebar-text: #c4b69a; --sidebar-active: #c4956a;
  --text: #3d2e1f; --text2: #6b5c4e; --text3: #8b7355; --text4: #a0937e;
  --accent: #c4956a; --accent2: #a07850; --border: #ddd5ca; --border2: #ede8e1; --border3: #f0ebe4;
  --green: #059669; --red: #dc2626; --amber: #d97706; --blue: #3b82f6;
  --input-bg: #faf7f3; --shadow: 0 1px 4px rgba(0,0,0,0.06); --shadow2: 0 4px 12px rgba(0,0,0,0.1);
}
[data-theme="dark"] {
  --bg: #141210; --bg2: #1c1916; --card: #242019; --card-hover: #2e2a22; --sidebar-bg: #1c1916;
  --text: #e8e0d8; --text2: #bfb5a8; --text3: #8b7355; --text4: #6b5c4e;
  --border: #3d3528; --border2: #332d24; --border3: #2a2520;
  --input-bg: #2a2520; --shadow: 0 1px 4px rgba(0,0,0,0.2); --shadow2: 0 4px 12px rgba(0,0,0,0.3);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
input, select, textarea, button { font-family: 'DM Sans', sans-serif; color: var(--text); }
input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes modalIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
@keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
@keyframes confettiDrop { 0% { transform:translateY(-20px) rotate(0deg); opacity:1; } 100% { transform:translateY(100vh) rotate(720deg); opacity:0; } }
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }

/* ── Sidebar ── */
.cm-sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: var(--sidebar-bg); display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s ease; }
.cm-sidebar-brand { padding: 20px 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; display: flex; align-items: center; justify-content: center; min-height: 80px; }
.cm-sidebar-logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #f5f0eb; }
.cm-sidebar-tag { font-size: 11px; color: var(--sidebar-text); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.cm-brand-logo { display: inline-block; }
.cm-brand-logo svg { width: 160px; height: 56px; }
.cm-brand-logo-sm svg { width: 24px; height: 24px; }
.cm-brand-logo-inv svg { width: 180px; height: 64px; }
.cm-sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.cm-nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: var(--sidebar-text); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; text-decoration: none; position: relative; }
.cm-nav-item:hover { background: rgba(255,255,255,0.05); color: #f5f0eb; }
.cm-nav-item.active { background: rgba(196,149,106,0.15); color: #f5f0eb; border-left-color: var(--accent); }
.cm-nav-item .nav-icon { font-size: 18px; width: 24px; text-align: center; }
.cm-nav-badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; margin-left: auto; }
.cm-sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
.cm-dark-toggle { display: flex; align-items: center; gap: 10px; color: var(--sidebar-text); font-size: 13px; cursor: pointer; padding: 8px 0; }

/* ── Theme Customizer ── */
.cm-customizer-btn { display: flex; align-items: center; gap: 10px; color: var(--sidebar-text); font-size: 13px; cursor: pointer; padding: 8px 0; border: none; background: none; width: 100%; }
.cm-customizer-btn:hover { color: #f5f0eb; }
.cm-customizer-panel { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 14px; margin-top: 4px; display: none; }
.cm-customizer-panel.open { display: block; animation: fadeIn 0.2s ease; }
.cm-cust-label { font-size: 11px; font-weight: 600; color: var(--sidebar-text); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.cm-accent-swatches { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.cm-swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; flex-shrink: 0; }
.cm-swatch:hover { transform: scale(1.15); }
.cm-swatch.active { border-color: #fff; transform: scale(1.15); }
.cm-swatch-custom { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px dashed rgba(255,255,255,0.4); overflow: hidden; position: relative; flex-shrink: 0; transition: all 0.2s; }
.cm-swatch-custom:hover { border-color: #fff; transform: scale(1.1); }
.cm-swatch-custom input[type="color"] { position: absolute; inset: -4px; width: calc(100% + 8px); height: calc(100% + 8px); cursor: pointer; opacity: 0; }
.cm-swatch-custom-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; pointer-events: none; }
.cm-sidebar-swatches { display: flex; gap: 6px; flex-wrap: wrap; }
.cm-sidebar-swatch { width: 26px; height: 26px; border-radius: 8px; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; flex-shrink: 0; }
.cm-sidebar-swatch:hover { transform: scale(1.1); }
.cm-sidebar-swatch.active { border-color: #fff; transform: scale(1.1); }
.cm-cust-divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0; }
.cm-reset-btn { font-size: 11px; color: rgba(255,255,255,0.35); background: none; border: none; cursor: pointer; padding: 4px 0; width: 100%; text-align: left; transition: color 0.2s; margin-top: 4px; }
.cm-reset-btn:hover { color: rgba(255,255,255,0.7); }
.cm-toggle-track { width: 40px; height: 22px; border-radius: 11px; background: rgba(255,255,255,0.15); position: relative; transition: background 0.3s; flex-shrink: 0; }
.cm-toggle-thumb { width: 18px; height: 18px; border-radius: 50%; background: #fff; position: absolute; top: 2px; left: 2px; transition: transform 0.3s; }
[data-theme="dark"] .cm-toggle-thumb { transform: translateX(18px); }
[data-theme="dark"] .cm-toggle-track { background: var(--accent); }
#notifTrack.notif-on { background: var(--accent); }
#notifThumb.notif-on { transform: translateX(18px); }

/* ── Main Content ── */
.cm-app { margin-left: 220px; min-height: 100vh; transition: margin-left 0.3s; }
.cm-topbar { display: none; }
.cm-main { max-width: 1000px; margin: 0 auto; padding: 24px 28px 100px; }
.cm-page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.cm-page-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--text); }
.cm-add-btn { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; box-shadow: 0 2px 8px rgba(196,149,106,0.3); transition: all 0.2s; }
.cm-add-btn:hover { background: var(--accent2); transform: translateY(-1px); }

/* ── Bottom Nav (Mobile) ── */
.cm-bottom-nav { display: none; }

/* ── Tab Content ── */
.cm-tab-content { display: none; }
.cm-tab-content.active { display: block; animation: fadeIn 0.35s ease; }

/* ── Cards & Components ── */
.cm-filter-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.cm-filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
.cm-filter-btn { background: var(--card); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; font-size: 13px; color: var(--text2); cursor: pointer; transition: all 0.2s; }
.cm-filter-btn:hover { border-color: var(--accent); }
.cm-filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.cm-search-input { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border); font-size: 14px; background: var(--card); margin-left: auto; width: 220px; color: var(--text); }
.cm-select { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border); font-size: 14px; background: var(--card); cursor: pointer; color: var(--text); }
.cm-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.cm-card { background: var(--card); border-radius: 14px; padding: 18px; box-shadow: var(--shadow); transition: all 0.25s; animation: fadeIn 0.3s ease both; }
.cm-card:hover { box-shadow: var(--shadow2); transform: translateY(-2px); }
.cm-card:nth-child(1) { animation-delay: 0s; } .cm-card:nth-child(2) { animation-delay: 0.05s; } .cm-card:nth-child(3) { animation-delay: 0.1s; }
.cm-card:nth-child(4) { animation-delay: 0.15s; } .cm-card:nth-child(5) { animation-delay: 0.2s; } .cm-card:nth-child(6) { animation-delay: 0.25s; }
.cm-order-card { border-left: 4px solid #ccc; }
.cm-order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.cm-status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.cm-status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.cm-urgent-badge { font-size: 11px; font-weight: 700; color: var(--red); background: #fee2e2; padding: 2px 8px; border-radius: 10px; animation: pulse 2s infinite; }
.cm-soon-badge { font-size: 11px; font-weight: 700; color: var(--amber); background: #fef3c7; padding: 2px 8px; border-radius: 10px; }
.cm-order-customer { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); margin-bottom: 4px; }
.cm-order-items { font-size: 14px; color: var(--text2); margin-bottom: 10px; line-height: 1.4; }
.cm-order-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
.cm-meta-item { font-size: 13px; color: var(--text3); }
.cm-order-notes { font-size: 13px; color: var(--text4); font-style: italic; margin-bottom: 8px; }
.cm-order-actions { display: flex; gap: 8px; align-items: center; padding-top: 10px; border-top: 1px solid var(--border3); flex-wrap: wrap; }
.cm-advance-btn { background: linear-gradient(135deg, #8fbc8f, #6b9e6b); color: #fff; border: none; padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.cm-advance-btn:hover { transform: scale(1.03); }
.cm-reorder-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
.cm-edit-btn { background: var(--card); border: 1px solid var(--border); padding: 6px 14px; border-radius: 8px; font-size: 13px; color: var(--text2); cursor: pointer; transition: all 0.2s; }
.cm-edit-btn:hover { border-color: var(--accent); color: var(--accent); }
.cm-delete-btn { background: none; border: none; color: var(--text4); font-size: 16px; cursor: pointer; margin-left: auto; padding: 4px 8px; transition: color 0.2s; }
.cm-delete-btn:hover { color: var(--red); }
.cm-expense-total { font-size: 18px; margin-bottom: 12px; color: var(--text); font-family: 'Playfair Display', serif; }
.cm-table-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid var(--border); background: var(--card); }
.cm-table { width: 100%; border-collapse: collapse; }
.cm-table th { text-align: left; padding: 10px 14px; font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; border-bottom: 2px solid var(--border2); background: var(--input-bg); }
.cm-table td { padding: 10px 14px; font-size: 14px; color: var(--text); border-bottom: 1px solid var(--border3); }
.cm-table tr:hover td { background: var(--card-hover); }
.cm-cat-pill { display: inline-block; background: var(--border2); color: var(--text2); padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.cm-edit-sm { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 6px; }
.cm-delete-sm { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 6px; color: var(--text4); }
.cm-stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.cm-stat-card { background: var(--card); border-radius: 14px; padding: 18px; text-align: center; box-shadow: var(--shadow); transition: transform 0.2s; }
.cm-stat-card:hover { transform: translateY(-3px); }
.cm-stat-icon { font-size: 28px; }
.cm-stat-label { font-size: 13px; color: var(--text3); margin-top: 4px; }
.cm-stat-value { font-size: 26px; font-weight: 700; font-family: 'Playfair Display', serif; }
.cm-stat-sub { font-size: 12px; color: var(--text4); }
.cm-dash-section { background: var(--card); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
.cm-section-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); margin-bottom: 14px; }
.cm-dash-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.cm-pipeline-bar { display: flex; gap: 3px; border-radius: 10px; overflow: hidden; height: 36px; }
.cm-pipeline-seg { display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 600; min-width: 40px; transition: width 0.5s ease; }
.cm-pipeline-legend { display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap; }
.cm-legend-item { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text2); }
.cm-legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.cm-chart-row { display: flex; gap: 8px; align-items: flex-end; height: 140px; }
.cm-chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.cm-chart-bars { width: 100%; display: flex; gap: 3px; align-items: flex-end; height: 110px; }
.cm-chart-bar { flex: 1; border-radius: 6px 6px 0 0; transition: height 0.5s ease; }
.cm-chart-label { font-size: 11px; color: var(--text3); }
.cm-chart-legend { display: flex; gap: 16px; margin-top: 8px; justify-content: center; }
.cm-chart-legend-item { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
.cm-chart-legend-swatch { width: 12px; height: 8px; border-radius: 3px; }
.cm-exp-bar-wrap { display: flex; flex-direction: column; gap: 10px; }
.cm-exp-bar-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); margin-bottom: 3px; }
.cm-exp-bar-track { height: 10px; background: var(--border2); border-radius: 5px; overflow: hidden; }
.cm-exp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 5px; transition: width 0.5s ease; }
.cm-top-items { display: flex; gap: 8px; flex-wrap: wrap; }
.cm-top-pill { display: inline-block; padding: 6px 14px; border-radius: 12px; font-size: 14px; font-weight: 500; }
.cm-top-pill:first-child { background: var(--accent); color: #fff; }
.cm-top-pill:not(:first-child) { background: var(--border2); color: var(--text2); }
.cm-insights { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.cm-insight { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 12px; font-size: 13px; color: var(--text); background: var(--card); border: 1px solid var(--border2); flex: 1; min-width: 240px; line-height: 1.4; transition: transform 0.2s; }
.cm-insight:hover { transform: translateY(-2px); }
.cm-insight strong { color: var(--accent); }
.cm-product-header { display: flex; justify-content: space-between; align-items: flex-start; }
.cm-product-name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); margin-top: 6px; }
.cm-product-price { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--green); }
.cm-product-desc { font-size: 14px; color: var(--text2); margin-top: 8px; line-height: 1.5; }
.cm-product-actions { display: flex; gap: 8px; margin-top: 12px; }
.cm-empty { text-align: center; padding: 60px 20px; }
.cm-empty-icon { font-size: 48px; margin-bottom: 12px; }
.cm-empty-text { color: var(--text3); font-size: 15px; }
.cm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; backdrop-filter: blur(6px); }
.cm-modal { background: var(--card); border-radius: 18px; padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; animation: modalIn 0.25s ease; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.cm-form-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); margin-bottom: 20px; }
.cm-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.cm-form-label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; font-weight: 500; color: var(--text2); }
.cm-form-label.full { grid-column: 1 / -1; }
.cm-form-input { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 14px; background: var(--input-bg); color: var(--text); transition: border-color 0.2s; }
.cm-form-input:focus { border-color: var(--accent); }
textarea.cm-form-input { height: 60px; resize: vertical; }
.cm-form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
.cm-cancel-btn { background: var(--card); border: 1px solid var(--border); padding: 10px 20px; border-radius: 10px; font-size: 14px; color: var(--text2); cursor: pointer; transition: all 0.2s; }
.cm-cancel-btn:hover { border-color: var(--accent); }
.cm-save-btn { background: var(--accent); color: #fff; border: none; padding: 10px 24px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; }
.cm-save-btn:hover { background: var(--accent2); transform: translateY(-1px); }
.cm-save-btn:disabled { opacity: 0.5; }
.cm-danger-btn { background: var(--red); color: #fff; border: none; padding: 10px 24px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; }
.cm-quick-pills { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.cm-quick-pill { background: var(--border2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 10px; font-size: 12px; color: var(--text3); cursor: pointer; transition: all 0.2s; }
.cm-quick-pill:hover { border-color: var(--accent); color: var(--accent); }
.cm-confirm { text-align: center; padding: 8px; }
.cm-confirm-actions { display: flex; gap: 12px; justify-content: center; }
.cm-quick-add { display: flex; gap: 8px; align-items: center; background: var(--card); border-radius: 14px; padding: 12px 16px; box-shadow: var(--shadow); margin-bottom: 16px; flex-wrap: wrap; }
.cm-quick-add input, .cm-quick-add select { padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 14px; background: var(--input-bg); color: var(--text); }
.cm-quick-add input.qa-desc { flex: 2; min-width: 140px; }
.cm-quick-add input.qa-amt { width: 100px; }
.cm-qa-btn { background: var(--accent); color: #fff; border: none; width: 38px; height: 38px; border-radius: 10px; font-size: 20px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.cm-qa-btn:hover { transform: scale(1.08); }
.cm-week-banner { background: var(--card); border-radius: 14px; padding: 14px 18px; box-shadow: var(--shadow); margin-bottom: 16px; border-left: 4px solid var(--accent); animation: slideIn 0.3s ease; }
.cm-week-banner-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.cm-week-banner-title .count { background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; padding: 1px 8px; border-radius: 10px; }
.cm-week-items { display: flex; gap: 8px; flex-wrap: wrap; }
.cm-week-chip { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 10px; font-size: 13px; background: var(--input-bg); border: 1px solid var(--border2); cursor: pointer; transition: all 0.2s; }
.cm-week-chip:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.cm-week-chip .chip-dot { width: 8px; height: 8px; border-radius: 50%; }
.cm-week-chip .chip-name { font-weight: 600; color: var(--text); }
.cm-week-chip .chip-date { color: var(--text3); font-size: 12px; }
.cm-week-chip.overdue { border-color: #fca5a5; background: #fef2f2; }
.cm-week-chip.today-chip { border-color: var(--accent); background: #fef9f3; }

<script>
const KEYS={orders:'cm-orders',expenses:'cm-expenses',products:'cm-products',recipes:'cp-recipes'},STATUS_FLOW=['Pending','In Progress','Complete','Delivered'],STATUS_COLORS={'Pending':{bg:'#fef3c7',text:'#92400e',dot:'#f59e0b'},'In Progress':{bg:'#dbeafe',text:'#1e40af',dot:'#3b82f6'},'Complete':{bg:'#d1fae5',text:'#065f46',dot:'#10b981'},'Delivered':{bg:'#e8e0d8',text:'#5c4a3a',dot:'#8b7355'}},EXPENSE_CATS=['Materials','Supplies','Packaging','Shipping','Equipment','Marketing','Fees & Subscriptions','Other'],PRODUCT_CATS=['Baked Goods','Candles & Wax','Soap & Bath','Jewelry & Accessories','Clothing & Textiles','Paper & Stationery','Art & Prints','Home Decor','Crafts & DIY','Digital Products','Seasonal','Custom','Other'],AVATAR_COLORS=['#c4956a','#8fbc8f','#6b9e6b','#3b82f6','#a07850','#d97706','#059669','#dc2626','#6366f1','#0891b2'];
const ORDER_PLATFORMS=['Etsy','eBay','Facebook','In-Person','Website','Other'];
const PLATFORM_COLORS={Etsy:{bg:'#F16521',text:'#fff'},eBay:{bg:'#0064D2',text:'#fff'},Facebook:{bg:'#1877F2',text:'#fff'},'In-Person':{bg:'#059669',text:'#fff'},Website:{bg:'#6366f1',text:'#fff'},Other:{bg:'#8b7355',text:'#fff'}};
const ORDER_TAGS=['Rush','Gift','Wholesale','Repeat'];
const TAG_COLORS={Rush:{bg:'#fee2e2',text:'#991b1b'},Gift:{bg:'#fce7f3',text:'#9d174d'},Wholesale:{bg:'#dbeafe',text:'#1e40af'},Repeat:{bg:'#d1fae5',text:'#065f46'}};
let S={orders:[],expenses:[],products:[],recipes:[],activeTab:'orders',orderFilter:'Active',orderSearch:'',orderPlatformFilter:'All',expCatFilter:'All',expMonthFilter:'All',prodCatFilter:'All',invFilter:'All',recipeCatFilter:'All',calMonth:new Date().getMonth(),calYear:new Date().getFullYear(),custSearch:'',custSort:'recent',custExpanded:null};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7),fmt$=n=>'$'+Number(n||0).toFixed(2),fmtDate=d=>{if(!d)return'—';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})},todayStr=()=>new Date().toISOString().slice(0,10),daysUntil=d=>{if(!d)return Infinity;return Math.ceil((new Date(d+'T12:00:00')-new Date(todayStr()+'T12:00:00'))/86400000)},monthKey=d=>d?d.slice(0,7):todayStr().slice(0,7),esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
async function loadAll(){for(const[k,key]of Object.entries(KEYS)){try{const r=localStorage.getItem(key);S[k]=r?JSON.parse(r):[];}catch{S[k]=[];}}}
async function save(k){try{localStorage.setItem(KEYS[k],JSON.stringify(S[k]));}catch(e){console.error(e);}}

/* ── Navigation ── */
const TAB_TITLES={orders:'📋 Orders',expenses:'💰 Expenses',dashboard:'📊 Dashboard',calendar:'📅 Calendar',customers:'👥 Customers',products:'🏷️ Products',inventory:'📦 Inventory',recipes:'📐 Recipes',tools:'🔧 Tools'};
const TAB_ADD={orders:'Order',expenses:'Expense',products:'Product',recipes:'Recipe'};

function switchTab(t){
  S.activeTab=t;
  document.querySelectorAll('.cm-nav-item').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.querySelectorAll('.cm-tab-content').forEach(c=>c.classList.toggle('active',c.id==='tab-'+t));
  document.getElementById('pageTitle').textContent=TAB_TITLES[t]||t;
  const addLabel=TAB_ADD[t];
  document.getElementById('desktopAddBtn').style.display=addLabel?'':'none';
  document.getElementById('desktopAddBtn').textContent=addLabel?'+ New '+addLabel:'';
  document.getElementById('headerAddBtn').style.display=addLabel?'':'none';
  document.getElementById('headerAddBtn').textContent=addLabel?'+ New':'';
  closeSidebar();
  render();
}

// Sidebar nav
document.getElementById('sideNav').addEventListener('click',e=>{const n=e.target.closest('.cm-nav-item');if(n)switchTab(n.dataset.tab);});
// Bottom nav
document.getElementById('bottomNav').addEventListener('click',e=>{const n=e.target.closest('.bnav-item');if(n)switchTab(n.dataset.tab);});
// Add buttons
document.getElementById('headerAddBtn').addEventListener('click',()=>{const t=S.activeTab==='expenses'?'expense':S.activeTab==='products'?'product':'order';openFormModal(t,null);});
document.getElementById('desktopAddBtn').addEventListener('click',()=>{const t=S.activeTab==='expenses'?'expense':S.activeTab==='products'?'product':'order';openFormModal(t,null);});

// Mobile sidebar
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');}
document.getElementById('menuBtn').addEventListener('click',openSidebar);
document.getElementById('sidebarOverlay').addEventListener('click',closeSidebar);

// Dark mode
document.getElementById('darkToggle').addEventListener('click',()=>{
  const html=document.documentElement;const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('themeLabel').textContent=isDark?'Dark Mode':'Light Mode';
  try{localStorage.setItem('cm-theme',isDark?'light':'dark');}catch{}
});
async function loadTheme(){try{const r=localStorage.getItem('cm-theme');if(r==='dark'){document.documentElement.setAttribute('data-theme','dark');document.getElementById('themeLabel').textContent='Light Mode';}}catch{}}

/* ── Theme Customizer ── */
const ACCENT_PRESETS=[
  {name:'Warm Tan',    val:'#c4956a', val2:'#a07850'},
  {name:'Rose',       val:'#e07070', val2:'#c05555'},
  {name:'Coral',      val:'#e8855a', val2:'#c96840'},
  {name:'Amber',      val:'#d97706', val2:'#b45a00'},
  {name:'Sage',       val:'#6b9e6b', val2:'#4e7a4e'},
  {name:'Teal',       val:'#0891b2', val2:'#0670a0'},
  {name:'Lavender',   val:'#8b6fc0', val2:'#6e52a8'},
  {name:'Berry',      val:'#9d4edd', val2:'#7b35bb'},
  {name:'Custom',     val:'custom'},
];
const SIDEBAR_PRESETS=[
  {name:'Brown',    bg:'#3d2e1f', text:'#c4b69a'},
  {name:'Slate',    bg:'#1e2a3a', text:'#8ea8c0'},
  {name:'Forest',   bg:'#1a2e1a', text:'#8ab88a'},
  {name:'Navy',     bg:'#0f172a', text:'#7a8fa8'},
  {name:'Plum',     bg:'#2d1b3d', text:'#b090d0'},
  {name:'Charcoal', bg:'#1c1c1c', text:'#aaaaaa'},
];

let _currentAccent = '#c4956a';
let _currentAccent2 = '#a07850';
let _currentSidebar = SIDEBAR_PRESETS[0];

function applyAccent(hex, hex2, save=true){
  _currentAccent = hex;
  _currentAccent2 = hex2 || darkenHex(hex, 0.15);
  const r=document.documentElement;
  r.style.setProperty('--accent', _currentAccent);
  r.style.setProperty('--accent2', _currentAccent2);
  r.style.setProperty('--sidebar-active', _currentAccent);
  // Update theme-color meta
  const tm=document.querySelector('meta[name="theme-color"]');
  if(tm)tm.setAttribute('content', _currentAccent);
  if(save){try{localStorage.setItem('cp-accent',_currentAccent);localStorage.setItem('cp-accent2',_currentAccent2);}catch{}}
  refreshSwatches();
  // Re-inject logos with new accent
  injectLogos();
}

function applySidebar(preset, save=true){
  _currentSidebar = preset;
  const r=document.documentElement;
  r.style.setProperty('--sidebar-bg', preset.bg);
  r.style.setProperty('--sidebar-text', preset.text);
  if(save){try{localStorage.setItem('cp-sidebar', JSON.stringify(preset));}catch{}}
  refreshSwatches();
  injectLogos();
}

function darkenHex(hex, amount){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.round(r*(1-amount)));g=Math.max(0,Math.round(g*(1-amount)));b=Math.max(0,Math.round(b*(1-amount)));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function refreshSwatches(){
  // Accent swatches
  const ac=document.getElementById('accentSwatches');
  if(!ac)return;
  ac.innerHTML=ACCENT_PRESETS.map(p=>{
    if(p.val==='custom'){
      return`<div class="cm-swatch-custom" title="Custom color"><input type="color" id="customAccentPicker" value="${_currentAccent}"><span class="cm-swatch-custom-icon">✏️</span></div>`;
    }
    const isActive=_currentAccent===p.val;
    return`<div class="cm-swatch${isActive?' active':''}" style="background:${p.val}" title="${p.name}" data-accent="${p.val}" data-accent2="${p.val2}"></div>`;
  }).join('');
  // Custom picker listener
  const cp=document.getElementById('customAccentPicker');
  if(cp){cp.addEventListener('input',e=>{applyAccent(e.target.value, darkenHex(e.target.value,0.15));});cp.addEventListener('change',e=>{applyAccent(e.target.value, darkenHex(e.target.value,0.15));});}
  // Sidebar swatches
  const sb=document.getElementById('sidebarSwatches');
  if(!sb)return;
  sb.innerHTML=SIDEBAR_PRESETS.map(p=>{
    const isActive=_currentSidebar.bg===p.bg;
    return`<div class="cm-sidebar-swatch${isActive?' active':''}" style="background:${p.bg}" title="${p.name}" data-sbg="${p.bg}" data-stxt="${p.text}"></div>`;
  }).join('');
}

// Customizer toggle
document.getElementById('customizerBtn').addEventListener('click',()=>{
  const panel=document.getElementById('customizerPanel');
  const chevron=document.getElementById('custChevron');
  const isOpen=panel.classList.contains('open');
  panel.classList.toggle('open',!isOpen);
  chevron.style.transform=isOpen?'':'rotate(180deg)';
  if(!isOpen)refreshSwatches();
});

// Swatch click delegation
document.getElementById('customizerPanel').addEventListener('click',e=>{
  const ac=e.target.closest('[data-accent]');
  if(ac){applyAccent(ac.dataset.accent, ac.dataset.accent2);return;}
  const sb=e.target.closest('[data-sbg]');
  if(sb){applySidebar({bg:sb.dataset.sbg,text:sb.dataset.stxt});return;}
});

// Reset button
document.getElementById('resetThemeBtn').addEventListener('click',()=>{
  applyAccent('#c4956a','#a07850');
  applySidebar(SIDEBAR_PRESETS[0]);
  try{localStorage.removeItem('cp-accent');localStorage.removeItem('cp-accent2');localStorage.removeItem('cp-sidebar');}catch{}
});

function loadCustomTheme(){
  try{
    const a=localStorage.getItem('cp-accent');
    const a2=localStorage.getItem('cp-accent2');
    const sb=localStorage.getItem('cp-sidebar');
    if(a)applyAccent(a, a2||darkenHex(a,0.15), false);
    if(sb)applySidebar(JSON.parse(sb), false);
  }catch{}
}

// Confetti
function fireConfetti(){const colors=['#f59e0b','#3b82f6','#10b981','#c4956a','#dc2626','#6366f1','#d97706','#059669'];for(let i=0;i<40;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.width=(6+Math.random()*8)+'px';el.style.height=(6+Math.random()*8)+'px';el.style.borderRadius=Math.random()>0.5?'50%':'2px';el.style.animationDuration=(2+Math.random()*1.5)+'s';el.style.animationDelay=(Math.random()*0.5)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),4000);}}

function openModal(h){document.getElementById('modalBody').innerHTML=h;document.getElementById('modalOverlay').style.display='flex';}
function closeModal(){document.getElementById('modalOverlay').style.display='none';}
function openConfirm(m,fn){openModal(`<div class="cm-confirm"><div style="font-size:40px;margin-bottom:12px">⚠️</div><p style="font-size:16px;color:var(--text);margin-bottom:20px">${esc(m)}</p><div class="cm-confirm-actions"><button class="cm-cancel-btn" onclick="closeModal()">Cancel</button><button class="cm-danger-btn" id="cY">Delete</button></div></div>`);document.getElementById('cY').onclick=()=>{fn();closeModal();};}
function openFormModal(t,d){if(t==='order')openOrderForm(d);else if(t==='expense')openExpenseForm(d);else if(t==='recipe')openRecipeForm(d);else openProductForm(d);}

function openOrderForm(data){
  const d=data||{id:uid(),customer:'',items:'',price:'',deposit:'',dueDate:'',status:'Pending',notes:'',internalNote:'',platform:'',tags:[],tracking:'',created:todayStr()};
  const so=STATUS_FLOW.map(s=>`<option ${s===d.status?'selected':''}>${s}</option>`).join('');
  const platOpts=['','...'+ORDER_PLATFORMS.join(',')].join('');
  const po=`<option value="">No platform</option>`+ORDER_PLATFORMS.map(p=>`<option ${p===(d.platform||'')?'selected':''}>${p}</option>`).join('');
  const prodOpts=S.products.length?`<optgroup label="── Products ──">${S.products.map(p=>`<option value="prod:${p.id}">${esc(p.name)} — ${fmt$(p.basePrice)}</option>`).join('')}</optgroup>`:'';
  const recOpts=S.recipes.length?`<optgroup label="── Recipes ──">${S.recipes.map(r=>`<option value="rec:${r.id}">${esc(r.name)} (${r.baseYield} ${esc(r.yieldUnit)})</option>`).join('')}</optgroup>`:'';
  const hasQuick=S.products.length||S.recipes.length;
  const quickSel=hasQuick?`<select class="cm-form-input" id="f-quick" style="margin-top:6px"><option value="">+ Add from Products or Recipes...</option>${prodOpts}${recOpts}</select>`:'';
  const tagChecks=ORDER_TAGS.map(t=>`<label class="cm-tag-check"><input type="checkbox" id="ft-${t}" ${(d.tags||[]).includes(t)?'checked':''}><span style="background:${TAG_COLORS[t].bg};color:${TAG_COLORS[t].text};padding:2px 8px;border-radius:8px;font-size:12px;font-weight:600">${t==='Rush'?'⚡':t==='Gift'?'🎁':t==='Wholesale'?'📦':'⭐'} ${t}</span></label>`).join('');
  openModal(`<h2 class="cm-form-title">${data?'Edit Order':'New Order'}</h2>
<div class="cm-form-grid">
  <label class="cm-form-label">Customer *<input class="cm-form-input" id="f-c" value="${esc(d.customer)}" placeholder="Customer name"></label>
  <label class="cm-form-label">Status<select class="cm-form-input" id="f-s">${so}</select></label>
  <label class="cm-form-label full">Items<input class="cm-form-input" id="f-i" value="${esc(d.items)}" placeholder="e.g. Birthday cake, Custom Wreath">${quickSel}</label>
  <label class="cm-form-label">Price *<input class="cm-form-input" id="f-p" type="number" step="0.01" min="0" value="${d.price}" placeholder="0.00"></label>
  <label class="cm-form-label">Deposit<input class="cm-form-input" id="f-d" type="number" step="0.01" min="0" value="${d.deposit}" placeholder="0.00"></label>
  <label class="cm-form-label">Due Date<input class="cm-form-input" id="f-dd" type="date" value="${d.dueDate}"></label>
  <label class="cm-form-label">Platform<select class="cm-form-input" id="f-plat">${po}</select></label>
  <label class="cm-form-label">Tracking #<input class="cm-form-input" id="f-track" value="${esc(d.tracking||'')}" placeholder="e.g. 1Z999AA1..."></label>
  <label class="cm-form-label full">Customer Notes<textarea class="cm-form-input" id="f-n" placeholder="Special instructions for customer...">${esc(d.notes||'')}</textarea></label>
  <label class="cm-form-label full">Internal Notes 🔒<textarea class="cm-form-input" id="f-in" placeholder="Private notes — not shown on invoice..." style="font-size:13px">${esc(d.internalNote||'')}</textarea></label>
  <label class="cm-form-label full">Tags<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px">${tagChecks}</div></label>
  <label class="cm-form-label full">Photo<div class="cm-photo-upload">${d.photo?`<img class="cm-photo-thumb" src="${d.photo}" id="f-preview">`:''}
    <label for="f-photo">📸 ${d.photo?'Change':'Add'} Photo</label>
    <input type="file" id="f-photo" accept="image/*" style="display:none" onchange="handlePhotoUpload(this)">
  </div></label>
</div>
<div class="cm-form-actions"><button class="cm-cancel-btn" onclick="closeModal()">Cancel</button><button class="cm-save-btn" id="sO">${data?'Save Changes':'Add Order'}</button></div>`);
  const qs=document.getElementById('f-quick');
  if(qs){qs.onchange=()=>{const val=qs.value;if(!val)return;const itemsEl=document.getElementById('f-i'),priceEl=document.getElementById('f-p');if(val.startsWith('prod:')){const p=S.products.find(x=>x.id===val.slice(5));if(p){itemsEl.value=itemsEl.value?itemsEl.value+', '+p.name:p.name;if(!priceEl.value||Number(priceEl.value)===0)priceEl.value=p.basePrice;}}else if(val.startsWith('rec:')){const r=S.recipes.find(x=>x.id===val.slice(4));if(r){const label=`${r.name} (${r.baseYield} ${r.yieldUnit})`;itemsEl.value=itemsEl.value?itemsEl.value+', '+label:label;}}qs.value='';};};
  document.getElementById('sO').onclick=()=>{
    const c=document.getElementById('f-c').value.trim(),p=document.getElementById('f-p').value;
    if(!c||!p)return;
    const selectedTags=ORDER_TAGS.filter(t=>document.getElementById('ft-'+t)?.checked);
    const o={id:d.id,customer:c,items:document.getElementById('f-i').value,price:p,deposit:document.getElementById('f-d').value||0,dueDate:document.getElementById('f-dd').value,status:document.getElementById('f-s').value,notes:document.getElementById('f-n').value,internalNote:document.getElementById('f-in').value,platform:document.getElementById('f-plat').value,tracking:document.getElementById('f-track').value,tags:selectedTags,photo:window._pendingPhoto||d.photo||'',created:d.created||todayStr()};
    window._pendingPhoto=null;
    if(data)S.orders=S.orders.map(x=>x.id===o.id?o:x);else S.orders.unshift(o);
    save('orders');closeModal();render();
  };
}
function openExpenseForm(data){const d=data||{id:uid(),description:'',amount:'',category:'Ingredients',date:todayStr()};const co=EXPENSE_CATS.map(c=>`<option ${c===d.category?'selected':''}>${c}</option>`).join('');openModal(`<h2 class="cm-form-title">${data?'Edit Expense':'New Expense'}</h2><div class="cm-form-grid"><label class="cm-form-label full">Description<input class="cm-form-input" id="f-ed" value="${esc(d.description)}" placeholder="What was this for?"></label><label class="cm-form-label">Amount *<input class="cm-form-input" id="f-ea" type="number" step="0.01" min="0" value="${d.amount}" placeholder="0.00"></label><label class="cm-form-label">Category<select class="cm-form-input" id="f-ec">${co}</select></label><label class="cm-form-label">Date<input class="cm-form-input" id="f-edt" type="date" value="${d.date}"></label></div><div class="cm-form-actions"><button class="cm-cancel-btn" onclick="closeModal()">Cancel</button><button class="cm-save-btn" id="sE">${data?'Save':'Add Expense'}</button></div>`);document.getElementById('sE').onclick=()=>{const a=document.getElementById('f-ea').value;if(!a)return;const o={id:d.id,description:document.getElementById('f-ed').value,amount:a,category:document.getElementById('f-ec').value,date:document.getElementById('f-edt').value||todayStr()};if(data)S.expenses=S.expenses.map(x=>x.id===o.id?o:x);else S.expenses.unshift(o);save('expenses');closeModal();render();};}


function render(){renderBadges();renderWeekBanner();renderOrders();renderExpenses();renderDashboard();renderCalendar();renderCustomers();renderProducts();renderInventory();renderRecipes();renderTools();}
function renderBadges(){
  const ob=S.orders.filter(o=>o.status!=='Delivered').length;
  document.getElementById('ordersBadge').textContent=ob;
  document.getElementById('productsBadge').textContent=S.products.length;
  const tracked=S.products.filter(p=>p.trackStock);
  const lowCount=tracked.filter(p=>stockStatus(p)==='out'||stockStatus(p)==='low').length;
  const badge=document.getElementById('invBadge');
  if(lowCount>0){badge.textContent=lowCount;badge.style.display='';}else{badge.style.display='none';}
}

function renderWeekBanner(){const b=document.getElementById('weekBanner'),td=todayStr(),we=new Date(new Date(td+'T12:00:00').getTime()+7*864e5).toISOString().slice(0,10);const up=S.orders.filter(o=>o.status!=='Delivered'&&o.dueDate&&o.dueDate<=we).sort((a,b)=>(a.dueDate||'9').localeCompare(b.dueDate||'9'));if(!up.length){b.innerHTML='';return;}b.innerHTML=`<div class="cm-week-banner"><div class="cm-week-banner-title">🔔 Coming Up <span class="count">${up.length}</span></div><div class="cm-week-items">${up.map(o=>{const d=daysUntil(o.dueDate),sc=STATUS_COLORS[o.status],x=d<0?'overdue':d===0?'today-chip':'',dl=d<0?'Overdue':d===0?'Today':d===1?'Tomorrow':fmtDate(o.dueDate);return`<div class="cm-week-chip ${x}" data-wo="${o.id}"><span class="chip-dot" style="background:${sc.dot}"></span><span class="chip-name">${esc(o.customer)}</span><span class="chip-date">${dl}</span></div>`;}).join('')}</div></div>`;}
document.getElementById('weekBanner').addEventListener('click',e=>{const c=e.target.closest('[data-wo]');if(c){const o=S.orders.find(x=>x.id===c.dataset.wo);if(o)openOrderForm(o);}});

function renderOrders(){
  const fs=['Active',...STATUS_FLOW,'All'];
  document.getElementById('orderFilters').innerHTML=fs.map(f=>`<button class="cm-filter-btn ${S.orderFilter===f?'active':''}" data-of="${f}">${f}</button>`).join('');
  const pf=['All',...ORDER_PLATFORMS];
  document.getElementById('platformFilters').innerHTML=pf.map(f=>`<button class="cm-filter-btn ${S.orderPlatformFilter===f?'active':''}" style="font-size:12px;padding:4px 10px" data-pf="${f}">${f==='All'?'All Platforms':f}</button>`).join('');
  let l=S.orders;
  if(S.orderFilter==='Active')l=l.filter(o=>o.status!=='Delivered');
  else if(S.orderFilter!=='All')l=l.filter(o=>o.status===S.orderFilter);
  if(S.orderPlatformFilter!=='All')l=l.filter(o=>o.platform===S.orderPlatformFilter);
  if(S.orderSearch){const q=S.orderSearch.toLowerCase();l=l.filter(o=>o.customer.toLowerCase().includes(q)||(o.items||'').toLowerCase().includes(q)||(o.tracking||'').toLowerCase().includes(q));}
  l.sort((a,b)=>{const sa=STATUS_FLOW.indexOf(a.status),sb=STATUS_FLOW.indexOf(b.status);if(sa!==sb)return sa-sb;const aRush=a.tags&&a.tags.includes('Rush'),bRush=b.tags&&b.tags.includes('Rush');if(aRush!==bRush)return aRush?-1:1;return(a.dueDate||'9')<(b.dueDate||'9')?-1:1;});
  if(!l.length){document.getElementById('ordersContent').innerHTML=`<div class="cm-empty"><div class="cm-empty-icon">📋</div><p class="cm-empty-text">No orders found</p><button class="cm-add-btn" style="margin-top:12px" onclick="openFormModal('order',null)">+ Add First Order</button></div>`;return;}
  document.getElementById('ordersContent').innerHTML='<div class="cm-card-grid">'+l.map(o=>{
    const d=daysUntil(o.dueDate),sc=STATUS_COLORS[o.status],isD=o.status==='Delivered';

function renderCalendar(){const y=S.calYear,m=S.calMonth,td=todayStr(),mn=new Date(y,m,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});const obd={};S.orders.forEach(o=>{if(o.dueDate){if(!obd[o.dueDate])obd[o.dueDate]=[];obd[o.dueDate].push(o);}});const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dip=new Date(y,m,0).getDate();const cells=[];for(let i=fd-1;i>=0;i--){const d=dip-i,pm=m===0?11:m-1,py=m===0?y-1:y;cells.push({d,ds:`${py}-${String(pm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,om:true});}for(let d=1;d<=dim;d++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;cells.push({d,ds,om:false,t:ds===td});}const rem=7-(cells.length%7);if(rem<7)for(let d=1;d<=rem;d++){const nm=m===11?0:m+1,ny=m===11?y+1:y;cells.push({d,ds:`${ny}-${String(nm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,om:true});}

document.getElementById('tab-customers').addEventListener('click',e=>{

document.getElementById('custSearch').addEventListener('input',e=>{S.custSearch=e.target.value;renderCustomers();});

function stockStatus(p){if(!p.trackStock)return'untracked';if(p.stock<=0)return'out';if(p.stock<=Number(p.lowStockAt||3))return'low';return'good';}
function stockLabel(p){if(!p.trackStock)return'Not tracked';if(p.stock<=0)return'Out of stock';if(p.stock<=Number(p.lowStockAt||3))return`Low — ${p.stock} left`;return`${p.stock} in stock`;}

function renderProducts(){document.getElementById('prodCatFilters').innerHTML=['All',...PRODUCT_CATS].map(c=>`<button class="cm-filter-btn ${S.prodCatFilter===c?'active':''}" data-pcf="${c}">${c}</button>`).join('');let l=S.prodCatFilter==='All'?S.products:S.products.filter(p=>p.category===S.prodCatFilter);if(!l.length){document.getElementById('productsContent').innerHTML=`<div class="cm-empty"><div class="cm-empty-icon">🏷️</div><p class="cm-empty-text">No products yet</p><button class="cm-add-btn" style="margin-top:12px" onclick="openFormModal('product',null)">+ Add Product</button></div>`;return;}
  document.getElementById('productsContent').innerHTML='<div class="cm-card-grid">'+l.map(p=>{const ss=stockStatus(p),sl=stockLabel(p);return`<div class="cm-card"><div class="cm-product-header"><div><span class="cm-cat-pill">${p.category}</span><h3 class="cm-product-name">${esc(p.name)}</h3></div><span class="cm-product-price">${fmt$(p.basePrice)}</span></div>${p.description?`<p class="cm-product-desc">${esc(p.description)}</p>`:''}<span class="cm-inv-stock-badge ${ss}">${ss==='out'?'🔴':ss==='low'?'🟡':ss==='good'?'🟢':'⚪'} ${sl}</span><div class="cm-product-actions"><button class="cm-edit-btn" data-ep="${p.id}">Edit</button><button class="cm-edit-btn" data-ip="${p.id}">Stock</button><button class="cm-delete-btn" data-dp="${p.id}">✕</button></div></div>`;}).join('')+'</div>';}
document.getElementById('tab-products').addEventListener('click',e=>{const cf=e.target.closest('[data-pcf]');if(cf){S.prodCatFilter=cf.dataset.pcf;render();return;}const ed=e.target.closest('[data-ep]');if(ed){const p=S.products.find(x=>x.id===ed.dataset.ep);if(p)openProductForm(p);return;}const adj=e.target.closest('[data-ip]');if(adj){const p=S.products.find(x=>x.id===adj.dataset.ip);if(p)openAdjustStock(p);return;}const dl=e.target.closest('[data-dp]');if(dl){const p=S.products.find(x=>x.id===dl.dataset.dp);if(p)openConfirm(`Delete "${p.name}"?`,()=>{S.products=S.products.filter(x=>x.id!==p.id);save('products');render();});}});

function openProductForm(data){const d=data||{id:uid(),name:'',basePrice:'',category:'Custom',description:'',trackStock:false,stock:0,lowStockAt:3};const co=PRODUCT_CATS.map(c=>`<option ${c===d.category?'selected':''}>${c}</option>`).join('');openModal(`<h2 class="cm-form-title">${data?'Edit Product':'New Product'}</h2><div class="cm-form-grid"><label class="cm-form-label">Name *<input class="cm-form-input" id="f-pn" value="${esc(d.name)}" placeholder="Product name"></label><label class="cm-form-label">Price *<input class="cm-form-input" id="f-pp" type="number" step="0.01" min="0" value="${d.basePrice}" placeholder="0.00"></label><label class="cm-form-label">Category<select class="cm-form-input" id="f-pc">${co}</select></label><label class="cm-form-label full">Description<textarea class="cm-form-input" id="f-pd" placeholder="Details...">${esc(d.description||'')}</textarea></label></div><div style="margin-top:16px;padding:14px;background:var(--input-bg);border-radius:12px;border:1px solid var(--border2)"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><input type="checkbox" id="f-ts" ${d.trackStock?'checked':''} style="width:18px;height:18px;accent-color:var(--accent)"><label for="f-ts" style="font-size:14px;font-weight:600;color:var(--text);cursor:pointer">📦 Track Inventory for this product</label></div><div class="cm-form-grid" id="stockFields" style="${d.trackStock?'':'opacity:0.4;pointer-events:none'}"><label class="cm-form-label">Current Stock<input class="cm-form-input" id="f-sk" type="number" min="0" step="1" value="${d.stock||0}" placeholder="0"></label><label class="cm-form-label">Low Stock Alert at<input class="cm-form-input" id="f-ls" type="number" min="0" step="1" value="${d.lowStockAt||3}" placeholder="3"></label></div></div><div class="cm-form-actions"><button class="cm-cancel-btn" onclick="closeModal()">Cancel</button><button class="cm-save-btn" id="sP">${data?'Save':'Add Product'}</button></div>`);
  document.getElementById('f-ts').onchange=e=>{document.getElementById('stockFields').style.opacity=e.target.checked?'1':'0.4';document.getElementById('stockFields').style.pointerEvents=e.target.checked?'':'none';};
  document.getElementById('sP').onclick=()=>{const n=document.getElementById('f-pn').value.trim(),bp=document.getElementById('f-pp').value;if(!n||!bp)return;const ts=document.getElementById('f-ts').checked;const o={id:d.id,name:n,basePrice:bp,category:document.getElementById('f-pc').value,description:document.getElementById('f-pd').value,trackStock:ts,stock:ts?Number(document.getElementById('f-sk').value)||0:d.stock||0,lowStockAt:Number(document.getElementById('f-ls').value)||3};if(data)S.products=S.products.map(x=>x.id===o.id?o:x);else S.products.unshift(o);save('products');closeModal();render();};}

/* ── Inventory tab ── */
function renderInventory(){
  const tracked=S.products.filter(p=>p.trackStock);
  const all=S.products;
  const outCount=tracked.filter(p=>p.stock<=0).length;
  const lowCount=tracked.filter(p=>p.stock>0&&p.stock<=Number(p.lowStockAt||3)).length;
  const goodCount=tracked.filter(p=>p.stock>Number(p.lowStockAt||3)).length;
  const filterBtns=['All','In Stock','Low Stock','Out of Stock','Untracked'].map(f=>`<button class="cm-filter-btn ${S.invFilter===f?'active':''}" data-ivf="${f}">${f}</button>`).join('');
  let items=S.products;
  if(S.invFilter==='In Stock')items=items.filter(p=>p.trackStock&&p.stock>Number(p.lowStockAt||3));
  else if(S.invFilter==='Low Stock')items=items.filter(p=>p.trackStock&&p.stock>0&&p.stock<=Number(p.lowStockAt||3));
  else if(S.invFilter==='Out of Stock')items=items.filter(p=>p.trackStock&&p.stock<=0);
  else if(S.invFilter==='Untracked')items=items.filter(p=>!p.trackStock);
  const cardsH=items.length?'<div class="cm-inv-grid">'+items.map(p=>{const ss=stockStatus(p);const adjH=p.trackStock?`<div class="cm-inv-adjust"><button class="cm-inv-adj-btn" data-im="${p.id}">−</button><input class="cm-inv-adj-input" id="si-${p.id}" type="number" min="0" value="${p.stock||0}"><button class="cm-inv-adj-btn" data-ip2="${p.id}">+</button></div>`:'';return`<div class="cm-inv-card ${ss}"><div class="cm-inv-card-name">${esc(p.name)}</div><div class="cm-inv-card-cat">${p.category} · ${fmt$(p.basePrice)}</div><div class="cm-inv-stock-row"><div>${p.trackStock?`<div class="cm-inv-stock-num ${ss}">${p.stock}</div><div class="cm-inv-threshold">Alert at ${p.lowStockAt||3} units</div>`:`<div class="cm-inv-stock-num untracked">Not tracked</div>`}</div>${adjH}</div><div style="display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border3)"><button class="cm-edit-btn" style="flex:1;font-size:12px" data-ie="${p.id}">Edit</button>${p.trackStock?`<button class="cm-save-btn" style="flex:1;font-size:12px;padding:6px 10px" data-is="${p.id}">Save Stock</button>`:''}<button class="cm-delete-btn" data-id="${p.id}" style="font-size:16px" title="Delete product">🗑️</button></div></div>`;}).join('')+'</div>':'<div class="cm-empty"><div class="cm-empty-icon">📦</div><p class="cm-empty-text">No items match this filter</p></div>';
  document.getElementById('inventoryContent').innerHTML=`<div class="cm-inv-summary"><div class="cm-inv-sum-card"><div class="cm-inv-sum-val" style="color:var(--red)">${outCount}</div><div class="cm-inv-sum-label">Out of Stock</div></div><div class="cm-inv-sum-card"><div class="cm-inv-sum-val" style="color:var(--amber)">${lowCount}</div><div class="cm-inv-sum-label">Low Stock</div></div><div class="cm-inv-sum-card"><div class="cm-inv-sum-val" style="color:var(--green)">${goodCount}</div><div class="cm-inv-sum-label">Well Stocked</div></div></div><div class="cm-filter-bar">${filterBtns}</div>${cardsH}`;}

document.getElementById('tab-inventory').addEventListener('click',e=>{
  const ff=e.target.closest('[data-ivf]');if(ff){S.invFilter=ff.dataset.ivf;renderInventory();return;}
  const ie=e.target.closest('[data-ie]');if(ie){const p=S.products.find(x=>x.id===ie.dataset.ie);if(p)openProductForm(p);return;}
  const im=e.target.closest('[data-im]');if(im){const p=S.products.find(x=>x.id===im.dataset.im);if(p){p.stock=Math.max(0,(p.stock||0)-1);const inp=document.getElementById('si-'+p.id);if(inp)inp.value=p.stock;save('products');renderBadges();}return;}
  const ip2=e.target.closest('[data-ip2]');if(ip2){const p=S.products.find(x=>x.id===ip2.dataset.ip2);if(p){p.stock=(p.stock||0)+1;const inp=document.getElementById('si-'+p.id);if(inp)inp.value=p.stock;save('products');renderBadges();}return;}
  const is=e.target.closest('[data-is]');if(is){const p=S.products.find(x=>x.id===is.dataset.is);if(p){const inp=document.getElementById('si-'+p.id);if(inp)p.stock=Math.max(0,Number(inp.value)||0);save('products');renderInventory();renderBadges();}return;}
  const id=e.target.closest('[data-id]');if(id){const p=S.products.find(x=>x.id===id.dataset.id);if(p)openConfirm(`Delete "${p.name}"?`,()=>{S.products=S.products.filter(x=>x.id!==p.id);save('products');render();});return;}
});

function openAdjustStock(p){openModal(`<h2 class="cm-form-title">📦 Adjust Stock — ${esc(p.name)}</h2><p style="color:var(--text3);font-size:13px;margin-bottom:20px">${p.trackStock?`Current stock: <strong>${p.stock}</strong> units`:'Stock tracking is off for this product. Enable it in Edit Product.'}</p>${p.trackStock?`<div class="cm-form-grid"><label class="cm-form-label full">New Stock Quantity<input class="cm-form-input" id="adj-qty" type="number" min="0" step="1" value="${p.stock||0}" placeholder="0"></label></div><div class="cm-form-actions"><button class="cm-cancel-btn" onclick="closeModal()">Cancel</button><button class="cm-save-btn" id="adjSave">Save</button></div>`:`<div class="cm-form-actions"><button class="cm-cancel-btn" onclick="closeModal()">Close</button><button class="cm-save-btn" onclick="closeModal();openProductForm(S.products.find(x=>x.id==='${p.id}'))">Edit Product</button></div>`}`);
  if(p.trackStock){document.getElementById('adjSave').onclick=()=>{p.stock=Math.max(0,Number(document.getElementById('adj-qty').value)||0);save('products');closeModal();render();};}
}

/* ── Recipes ── */
const RECIPE_CATS=['Baked Goods','Candles','Soap','Jewelry','Crafts','Other'];
const ING_UNITS=['cups','tbsp','tsp','oz','g','kg','lb','ml','L','each','pinch','drops','sticks','sheets'];

function fmtAmt(n){const r=Math.round(n*1000)/1000;return r%1===0?r.toString():r.toFixed(3).replace(/\.?0+$/,'');}

function renderRecipes(){
  const cats=['All',...RECIPE_CATS];
  document.getElementById('recipeCatFilters').innerHTML=cats.map(c=>`<button class="cm-filter-btn ${S.recipeCatFilter===c?'active':''}" data-rcf="${c}">${c}</button>`).join('');
  let list=S.recipeCatFilter==='All'?S.recipes:S.recipes.filter(r=>r.category===S.recipeCatFilter);
  if(!list.length){
    document.getElementById('recipesContent').innerHTML=`<div class="cm-empty"><div class="cm-empty-icon">📐</div><p class="cm-empty-text">${S.recipeCatFilter==='All'?'No recipes yet — add your first batch recipe!':'No recipes in this category'}</p>${S.recipeCatFilter==='All'?`<button class="cm-add-btn" style="margin-top:12px" onclick="openRecipeForm(null)">+ Add Recipe</button>`:''}</div>`;
    return;
  }
  document.getElementById('recipesContent').innerHTML='<div class="cm-card-grid">'+list.map(r=>{
    const ingPreview=r.ingredients.slice(0,4).map(i=>`${fmtAmt(i.amount)} ${i.unit} ${esc(i.name)}`).join(', ')+(r.ingredients.length>4?` +${r.ingredients.length-4} more`:'');
    return`<div class="cm-recipe-card"><div class="cm-product-header"><div><span class="cm-cat-pill">${r.category}</span><h3 class="cm-recipe-name">${esc(r.name)}</h3></div><div style="text-align:right"><div class="cm-recipe-yield">${r.baseYield}</div><div style="font-size:11px;color:var(--text3)">${esc(r.yieldUnit)}</div></div></div><div class="cm-recipe-meta"><span>📋 ${r.ingredients.length} ingredient${r.ingredients.length!==1?'s':''}</span>${r.notes?'<span>📝 Has notes</span>':''}</div><div class="cm-recipe-ing-list">${ingPreview}</div><div class="cm-recipe-actions"><button class="cm-scale-btn" data-rs="${r.id}">⚖️ Scale Batch</button><button class="cm-edit-btn" data-re="${r.id}">Edit</button><button class="cm-delete-btn" data-rd="${r.id}">✕</button></div></div>`;
  }).join('')+'</div>';
}

document.getElementById('tab-recipes').addEventListener('click',e=>{
  const cf=e.target.closest('[data-rcf]');if(cf){S.recipeCatFilter=cf.dataset.rcf;renderRecipes();return;}
  const rs=e.target.closest('[data-rs]');if(rs){const r=S.recipes.find(x=>x.id===rs.dataset.rs);if(r)openScaleModal(r);return;}
  const re=e.target.closest('[data-re]');if(re){const r=S.recipes.find(x=>x.id===re.dataset.re);if(r)openRecipeForm(r);return;}
  const rd=e.target.closest('[data-rd]');if(rd){const r=S.recipes.find(x=>x.id===rd.dataset.rd);if(r)openConfirm(`Delete "${r.name}"?`,()=>{S.recipes=S.recipes.filter(x=>x.id!==r.id);save('recipes');renderRecipes();});}
});

function openRecipeForm(data){
  const d=data||{id:uid(),name:'',category:'Baked Goods',baseYield:12,yieldUnit:'pieces',ingredients:[{name:'',amount:'',unit:'cups'}],notes:''};
  const catOpts=RECIPE_CATS.map(c=>`<option ${c===d.category?'selected':''}>${c}</option>`).join('');
  const unitOpts=u=>ING_UNITS.map(x=>`<option ${x===u?'selected':''}>${x}</option>`).join('');
  const buildIngRow=(ing,i)=>`<div class="cm-ing-row" id="ir-${i}"><input class="cm-form-input" placeholder="Ingredient name" id="in-${i}" value="${esc(ing.name)}"><input class="cm-form-input" type="number" min="0" step="any" placeholder="Amount" id="ia-${i}" value="${ing.amount}"><select class="cm-form-input" id="iu-${i}">${unitOpts(ing.unit)}</select><button type="button" class="cm-ing-remove" onclick="removeIngRow(${i})">✕</button></div>`;
  const mb=document.getElementById('modalBody');mb.style.maxWidth='600px';
  openModal(`<h2 class="cm-form-title">${data?'Edit Recipe':'New Recipe'}</h2>
<div class="cm-form-grid">
  <label class="cm-form-label full">Recipe Name *<input class="cm-form-input" id="r-name" value="${esc(d.name)}" placeholder="e.g. Chocolate Chip Cookies"></label>
  <label class="cm-form-label">Category<select class="cm-form-input" id="r-cat">${catOpts}</select></label>
  <label class="cm-form-label">Base Yield *<input class="cm-form-input" id="r-yield" type="number" min="0.1" step="any" value="${d.baseYield}" placeholder="12"></label>
  <label class="cm-form-label full">Yield Unit<input class="cm-form-input" id="r-unit" value="${esc(d.yieldUnit)}" placeholder="e.g. cookies, candles, bars, oz"></label>
</div>
<div style="margin-top:16px">
  <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px">Ingredients</div>
  <div class="cm-ing-row-head"><span>Name</span><span>Amount</span><span>Unit</span><span></span></div>
  <div id="ingRows">${d.ingredients.map((ing,i)=>buildIngRow(ing,i)).join('')}</div>
  <button type="button" class="cm-add-ing-btn" onclick="addIngRow()">+ Add Ingredient</button>
</div>
<label class="cm-form-label" style="margin-top:16px">Notes<textarea class="cm-form-input" id="r-notes" placeholder="Baking temps, tips, variations...">${esc(d.notes||'')}</textarea></label>
<div class="cm-form-actions"><button class="cm-cancel-btn" onclick="closeModal();document.getElementById('modalBody').style.maxWidth='520px'">Cancel</button><button class="cm-save-btn" id="rSave">${data?'Save Changes':'Add Recipe'}</button></div>`);
  window._recipeIngCount=d.ingredients.length;
  window._buildIngRow=buildIngRow;
  document.getElementById('rSave').onclick=()=>{
    const name=document.getElementById('r-name').value.trim();
    const yld=Number(document.getElementById('r-yield').value);
    if(!name||!yld)return;
    const ings=[];
    for(let i=0;i<window._recipeIngCount;i++){
      const row=document.getElementById('ir-'+i);
      if(!row)continue;
      const n=document.getElementById('in-'+i)?.value.trim();
      const a=Number(document.getElementById('ia-'+i)?.value);
      const u=document.getElementById('iu-'+i)?.value;
      if(n&&a)ings.push({name:n,amount:a,unit:u||'each'});
    }
    if(!ings.length)return;
    const rec={id:d.id,name,category:document.getElementById('r-cat').value,baseYield:yld,yieldUnit:document.getElementById('r-unit').value||'pieces',ingredients:ings,notes:document.getElementById('r-notes').value};
    if(data)S.recipes=S.recipes.map(x=>x.id===rec.id?rec:x);else S.recipes.unshift(rec);
    save('recipes');closeModal();document.getElementById('modalBody').style.maxWidth='520px';renderRecipes();
  };
}

window.addIngRow=function(){
  const i=window._recipeIngCount++;
  const unitOpts=ING_UNITS.map(x=>`<option>${x}</option>`).join('');
  const row=document.createElement('div');
  row.className='cm-ing-row';row.id='ir-'+i;
  row.innerHTML=`<input class="cm-form-input" placeholder="Ingredient name" id="in-${i}"><input class="cm-form-input" type="number" min="0" step="any" placeholder="Amount" id="ia-${i}"><select class="cm-form-input" id="iu-${i}">${unitOpts}</select><button type="button" class="cm-ing-remove" onclick="removeIngRow(${i})">✕</button>`;
  document.getElementById('ingRows').appendChild(row);
};

window.removeIngRow=function(i){
  const row=document.getElementById('ir-'+i);
  if(row)row.remove();
};

function openScaleModal(r){
  const mb=document.getElementById('modalBody');mb.style.maxWidth='560px';
  openModal(`<h2 class="cm-form-title">⚖️ Scale — ${esc(r.name)}</h2>
<p style="font-size:13px;color:var(--text3);margin-bottom:16px">Base recipe makes <strong>${r.baseYield} ${esc(r.yieldUnit)}</strong>. Enter your target to scale all ingredients.</p>

window.calcScale=function(rid){
  const r=S.recipes.find(x=>x.id===rid);if(!r)return;
  const target=Number(document.getElementById('sc-target')?.value)||r.baseYield;
  const mult=target/r.baseYield;
  const mEl=document.getElementById('sc-mult');if(mEl)mEl.textContent=Math.round(mult*100)/100+'×';
  const rows=r.ingredients.map(ing=>{
    const scaled=ing.amount*mult;
    return`<div class="cm-scale-ing-row"><span class="cm-scale-ing-name">${esc(ing.name)}</span><span class="cm-scale-ing-amt">${fmtAmt(scaled)} ${ing.unit}</span></div>`;
  }).join('');
  const res=document.getElementById('sc-result');if(!res)return;
  res.innerHTML=`<div class="cm-scale-result-title">Ingredients for ${fmtAmt(target)} ${esc(r.yieldUnit)}</div>${rows}`;
  if(r.notes)res.innerHTML+=`<div style="margin-top:12px;font-size:12px;color:var(--text3);font-style:italic">📝 ${esc(r.notes)}</div>`;
};

function decrementStockForOrder(order){
  if(!order.items)return;
  const itemNames=order.items.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean);
  let changed=false;
  itemNames.forEach(name=>{const p=S.products.find(x=>x.trackStock&&x.name.toLowerCase()===name);if(p&&p.stock>0){p.stock=Math.max(0,p.stock-1);changed=true;}});
  if(changed)save('products');
}

window._pendingPhoto=null;function handlePhotoUpload(input){const f=input.files[0];if(!f)return;const reader=new FileReader();reader.onload=e=>{const canvas=document.createElement('canvas'),img=new Image();img.onload=()=>{const max=400;let w=img.width,h=img.height;if(w>max){h=h*(max/w);w=max;}if(h>max){w=w*(max/h);h=max;}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);window._pendingPhoto=canvas.toDataURL('image/jpeg',0.7);let prev=document.getElementById('f-preview');if(!prev){prev=document.createElement('img');prev.id='f-preview';prev.className='cm-photo-thumb';input.parentElement.insertBefore(prev,input.parentElement.firstChild);}prev.src=window._pendingPhoto;};img.src=e.target.result;};reader.readAsDataURL(f);}

async function shareInvoice(){
  const invoiceEl=document.getElementById('modalBody').querySelector('.cm-invoice');
  if(!invoiceEl){showToast('❌ Invoice not found','var(--red)');return;}
  const shareBtn=document.querySelector('[onclick="shareInvoice()"]');
  if(shareBtn){shareBtn.textContent='⏳ Preparing...';shareBtn.disabled=true;}
  try{
    // Temporarily force light colors for clean image regardless of dark mode
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    if(isDark){invoiceEl.style.background='#fff';invoiceEl.style.color='#3d2e1f';}
    const canvas=await html2canvas(invoiceEl,{
      backgroundColor:'#ffffff',
      scale:2,
      useCORS:true,
      logging:false,
      width:invoiceEl.scrollWidth,
      height:invoiceEl.scrollHeight
    });
    if(isDark){invoiceEl.style.background='';invoiceEl.style.color='';}
    canvas.toBlob(async(blob)=>{
      if(!blob){showToast('❌ Could not generate image','var(--red)');return;}
      const file=new File([blob],'crafty-planner-invoice.png',{type:'image/png'});
      // Try native share sheet first (mobile)
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        try{
          await navigator.share({
            title:'Invoice — Crafty Planner',
            text:'Please find your invoice attached.',
            files:[file]
          });
          showToast('✅ Invoice shared!','var(--green)');
        }catch(err){
          if(err.name!=='AbortError')showToast('❌ Share failed','var(--red)');
        }
      } else if(navigator.share){
        // Share without file (some browsers)
        const url=URL.createObjectURL(blob);
        try{
          await navigator.share({title:'Invoice — Crafty Planner',text:'Your invoice from Crafty Planner.',url});
          showToast('✅ Invoice shared!','var(--green)');
        }catch(err){if(err.name!=='AbortError')downloadInvoiceImage(blob);}
        URL.revokeObjectURL(url);
      } else {
        // Fallback — download as image
        downloadInvoiceImage(blob);
      }
      if(shareBtn){shareBtn.textContent='📤 Share';shareBtn.disabled=false;}
    },'image/png');
  }catch(err){
    console.error(err);
    showToast('❌ Could not capture invoice','var(--red)');
    if(shareBtn){shareBtn.textContent='📤 Share';shareBtn.disabled=false;}
  }
}

function downloadInvoiceImage(blob){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='crafty-planner-invoice.png';
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 Invoice saved as image','var(--accent)');
}

/* ── iCal Export ── */
function exportICal(){
  const orders=S.orders.filter(o=>o.dueDate&&o.status!=='Delivered');
  const allOrders=S.orders.filter(o=>o.dueDate);
  if(!allOrders.length){
    showToast('No orders with due dates to export','var(--amber)');
    return;
  }

  const pad=n=>String(n).padStart(2,'0');
  const icalDate=dateStr=>{
    // dateStr is YYYY-MM-DD — convert to iCal all-day format YYYYMMDD
    return dateStr.replace(/-/g,'');
  };
  const icalNow=()=>{
    const d=new Date();
    return`${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}${pad(d.getUTCSeconds())}Z`;
  };
  const escIcal=s=>(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
  const foldLine=line=>{
    // iCal spec: lines > 75 chars must be folded with CRLF + space
    const out=[];
    while(line.length>75){out.push(line.slice(0,75));line=' '+line.slice(75);}
    out.push(line);
    return out.join('\r\n');
  };

  const now=icalNow();
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Crafty Planner//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH',`X-WR-CALNAME:Crafty Planner Orders`,`X-WR-CALDESC:Order due dates from Crafty Planner`,'X-WR-TIMEZONE:America/New_York'];

  allOrders.forEach(o=>{
    const uid=`${o.id}@crafty-planner`;
    const dtstart=icalDate(o.dueDate);
    // All-day event ends next day in iCal
    const dtend=icalDate(new Date(new Date(o.dueDate+'T12:00:00').getTime()+864e5).toISOString().slice(0,10));

    // Build summary and description
    const statusLabel=o.status==='Delivered'?'✓ Delivered':o.status;
    const summary=`${escIcal(o.customer)} — ${escIcal((o.items||'Order').split(',')[0].trim())}`;
    const descParts=[
      `Customer: ${o.customer||'—'}`,
      `Items: ${o.items||'—'}`,
      `Price: ${fmt$(o.price)}`,
      o.deposit&&Number(o.deposit)>0?`Deposit: ${fmt$(o.deposit)}`:'',
      `Status: ${statusLabel}`,
      o.platform?`Platform: ${o.platform}`:'',
      o.tags&&o.tags.length?`Tags: ${o.tags.join(', ')}`:'',
      o.tracking?`Tracking: ${o.tracking}`:'',
      o.notes?`Notes: ${o.notes}`:'',
    ].filter(Boolean).join('\\n');

    lines.push('BEGIN:VEVENT');
    lines.push(foldLine(`UID:${uid}`));
    lines.push(`DTSTAMP:${now}`);
    lines.push(`DTSTART;VALUE=DATE:${dtstart}`);
    lines.push(`DTEND;VALUE=DATE:${dtend}`);
    lines.push(foldLine(`SUMMARY:${summary}`));
    lines.push(foldLine(`DESCRIPTION:${descParts}`));
    // Color via category — maps to standard iCal colors
    const colorMap={'Pending':'#f59e0b','In Progress':'#3b82f6','Complete':'#10b981','Delivered':'#8b7355'};
    const color=colorMap[o.status]||'#c4956a';
    lines.push(`COLOR:${color}`);
    // 1-day before alarm
    if(o.status!=='Delivered'){
      lines.push('BEGIN:VALARM');
      lines.push('TRIGGER:-P1D');
      lines.push('ACTION:DISPLAY');
      lines.push(foldLine(`DESCRIPTION:Due tomorrow: ${escIcal(o.customer)}`));
      lines.push('END:VALARM');
    }
    lines.push('END:VEVENT');
  });

  lines.push('END:VCALENDAR');
  const ical=lines.join('\r\n');
  const blob=new Blob([ical],{type:'text/calendar;charset=utf-8'});
  const date=todayStr().replace(/-/g,'');
  const filename=`crafty-planner-orders-${date}.ics`;

  // Try native share first (mobile), fallback to download
  if(navigator.share&&navigator.canShare){
    const file=new File([blob],filename,{type:'text/calendar'});
    if(navigator.canShare({files:[file]})){
      navigator.share({title:'Crafty Planner — Order Calendar',files:[file]})
        .then(()=>showToast('✅ Calendar exported!','var(--green)'))
        .catch(err=>{if(err.name!=='AbortError')downloadICal(blob,filename);});
      return;
    }
  }
  downloadICal(blob,filename);
}

function downloadICal(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
  showToast(`✅ Calendar file downloaded — open it to import into Google Calendar, Apple Calendar, or Outlook`,'var(--green)');
}
function openMonthlyReport(){
  // Build month options from available data + last 12 months
  const months=new Set();
  const now=new Date();
  for(let i=0;i<12;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.add(d.toISOString().slice(0,7));}
  S.orders.forEach(o=>{if(o.dueDate)months.add(o.dueDate.slice(0,7));if(o.created)months.add(o.created.slice(0,7));});
  S.expenses.forEach(e=>{if(e.date)months.add(e.date.slice(0,7));});
  const sorted=[...months].sort().reverse();
  const curMonth=now.toISOString().slice(0,7);
  const opts=sorted.map(m=>{const d=new Date(m+'-15');return`<option value="${m}" ${m===curMonth?'selected':''}>${d.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</option>`;}).join('');

function calcMonthData(mk){
  const orders=S.orders.filter(o=>o.status==='Delivered'&&(o.dueDate||o.created||'').startsWith(mk));
  const expenses=S.expenses.filter(e=>(e.date||'').startsWith(mk));
  const rev=orders.reduce((s,o)=>s+Number(o.price||0),0);
  const exp=expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const profit=rev-exp;
  const expByCat={};
  expenses.forEach(e=>{expByCat[e.category]=(expByCat[e.category]||0)+Number(e.amount||0);});
  const expByCatArr=Object.entries(expByCat).sort((a,b)=>b[1]-a[1]);
  const itemCounts={};
  orders.forEach(o=>{(o.items||'').split(',').map(s=>s.trim()).filter(Boolean).forEach(it=>{itemCounts[it]=(itemCounts[it]||0)+1;});});
  const topItems=Object.entries(itemCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  return{rev,exp,profit,orders,expenses,expByCat:expByCatArr,topItems};
}

    ];

      const x=M+i*(kpiW+4);

      doc.roundedRect(x,y,kpiW,22,3,3,'F');
      doc.setFontSize(8);doc.setTextColor(...gray);doc.setFont('helvetica','normal');
      doc.text(k.label,x+kpiW/2,y+7,'center');
      doc.setFontSize(16);doc.setFont('helvetica','bold');doc.setTextColor(...k.color);
      doc.text(k.val,x+kpiW/2,y+16,'center');
    });
    y+=30;

      doc.setFillColor(...accent);
      doc.rect(M,y,W-M*2,7,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(255,255,255);
      doc.text(title,M+3,y+5);
      y+=10;
    };

    const tableRow=(cols,widths,isHeader=false,shade=false)=>{
      const rowH=7;
      if(shade){doc.setFillColor(...lightGray);doc.rect(M,y,W-M*2,rowH,'F');}
      doc.setFont('helvetica',isHeader?'bold':'normal');

      doc.text('No delivered orders this month.',M+2,y+5);y+=10;
    }

    y+=4;
    if(y>250){doc.addPage();y=M;}

    // ── Expenses section ──
    sectionHeader(`EXPENSES (${expenses.length})`);
    if(expenses.length){
      const ew=[70,55,30,17];
      tableRow(['Description','Category','Date','Amount'],ew,true);
      expenses.forEach((e,i)=>{
        if(y>270){doc.addPage();y=M;}
        tableRow([e.description||'—',e.category||'—',e.date?fmtDate(e.date):'—',fmt$(e.amount)],ew,false,i%2===0);
      });
      doc.setDrawColor(...accent);
      doc.line(M,y,W-M,y);y+=2;
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...dark);
      doc.text('Total Expenses',M+2,y+5);
      doc.setTextColor(217,119,6);
      doc.text(fmt$(exp),W-M-2,y+5,'right');

    } else {
      doc.setFont('helvetica','italic');doc.setFontSize(9);doc.setTextColor(...gray);
      doc.text('No expenses recorded this month.',M+2,y+5);y+=10;
    }

    y+=4;
    if(y>240){doc.addPage();y=M;}

    // ── Expense breakdown ──
    if(expByCat.length){
      sectionHeader('EXPENSES BY CATEGORY');
      expByCat.forEach(([cat,amt],i)=>{
        if(y>270){doc.addPage();y=M;}
        const pct=exp>0?((amt/exp)*100).toFixed(1):'0';
        tableRow([cat,`${pct}%`,fmt$(amt)],[100,30,42],false,i%2===0);
      });

    }

    // ── Top items ──
    if(topItems.length){
      if(y>250){doc.addPage();y=M;}
      sectionHeader('TOP SELLING ITEMS');
      topItems.forEach(([item,count],i)=>{
        tableRow([item,`×${count} orders`],[130,42],false,i%2===0);
      });
      y+=4;
    }

    // ── Summary footer ──
    if(y>260){doc.addPage();y=M;}
    y+=4;
    doc.setFillColor(...(profit>=0?[5,150,105]:[220,38,38]));
    doc.rect(M,y,W-M*2,14,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(255,255,255);
    doc.text(profit>=0?'Net Profit':'Net Loss',M+4,y+9);
    doc.text(fmt$(Math.abs(profit)),W-M-4,y+9,'right');
    y+=22;

    // Page footer
    const pageCount=doc.getNumberOfPages();
    for(let i=1;i<=pageCount;i++){
      doc.setPage(i);
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...gray);
      doc.text(`Crafty Planner · ${monthLabel} Report · Page ${i} of ${pageCount}`,W/2,290,'center');
    }

    // Share or download
    const filename=`crafty-planner-${mk}-report.pdf`;
    if(share){
      const pdfBlob=doc.output('blob');
      const file=new File([pdfBlob],filename,{type:'application/pdf'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({title:`Crafty Planner — ${monthLabel} Report`,files:[file]});

        showToast('💾 Report downloaded','var(--accent)');
      }
    } else {
      doc.save(filename);
      showToast('✅ Report downloaded!','var(--green)');
    }
  }catch(err){
    console.error(err);
    showToast('❌ Could not generate report','var(--red)');
  }
  if(btn){btn.textContent=share?'📤 Share PDF':'⬇️ Download PDF';btn.disabled=false;}
}

function exportFullCSV(){
  const q=s=>`"${(s||'').toString().replace(/"/g,'""')}"`;
  const rows=[];
  // Header
  rows.push(['Type','Date','Reference','Description','Amount','Category','Status','Customer','Platform','Tags','Tracking','Notes','Internal Notes','Created'].join(','));

  // Orders
  S.orders.forEach(o=>{
    rows.push([
      q('Order'),
      q(o.dueDate||o.created||''),
      q(o.id),
      q(o.items||''),
      Number(o.price||0).toFixed(2),
      q(o.platform||''),
      q(o.status||''),
      q(o.customer||''),
      q(o.platform||''),
      q((o.tags||[]).join(', ')),
      q(o.tracking||''),
      q(o.notes||''),
      q(o.internalNote||''),
      q(o.created||'')
    ].join(','));
    // Deposit as its own row if present
    if(Number(o.deposit)>0){
      rows.push([
        q('Deposit'),
        q(o.dueDate||o.created||''),
        q(o.id),
        q(`Deposit — ${o.customer||''}`),
        Number(o.deposit||0).toFixed(2),
        q(''),
        q(o.status||''),
        q(o.customer||''),
        q(o.platform||''),
        q(''),q(''),q(''),q(''),
        q(o.created||'')
      ].join(','));
    }
  });

  // Expenses
  S.expenses.forEach(e=>{
    rows.push([
      q('Expense'),
      q(e.date||''),
      q(e.id),
      q(e.description||''),
      (-Number(e.amount||0)).toFixed(2),
      q(e.category||''),
      q(''),q(''),q(''),q(''),q(''),
      q(''),q(''),
      q(e.date||'')
    ].join(','));
  });

  // Products
  S.products.forEach(p=>{
    rows.push([
      q('Product'),
      q(''),
      q(p.id),
      q(p.name||''),
      Number(p.basePrice||0).toFixed(2),
      q(p.category||''),
      q(p.trackStock?`Stock: ${p.stock}`:'Not tracked'),
      q(''),q(''),q(''),q(''),
      q(p.description||''),q(''),q('')
    ].join(','));
  });

  // Recipes
  S.recipes.forEach(r=>{
    const ingList=(r.ingredients||[]).map(i=>`${i.amount} ${i.unit} ${i.name}`).join('; ');
    rows.push([
      q('Recipe'),
      q(''),
      q(r.id),
      q(r.name||''),
      q(''),
      q(r.category||''),
      q(`Yield: ${r.baseYield} ${r.yieldUnit}`),
      q(''),q(''),q(''),q(''),
      q(ingList),
      q(r.notes||''),
      q('')
    ].join(','));
  });

  const csv=rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=todayStr().replace(/-/g,'');
  a.href=url;
  a.download=`crafty-planner-full-export-${date}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  const total=S.orders.length+S.expenses.length+S.products.length+S.recipes.length;
  showToast(`✅ Exported ${total} records to CSV`,'var(--green)');
}
