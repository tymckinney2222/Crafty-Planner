function backupData(){
  const backup={
    version:1,
    exportedAt:new Date().toISOString(),
    appName:'Crafty Planner',
    data:{
      orders:S.orders,
      expenses:S.expenses,
      products:S.products,
      recipes:S.recipes
    }
  };
  const json=JSON.stringify(backup,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=todayStr().replace(/-/g,'');
  a.href=url;
  a.download=`crafty-planner-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  // Show confirmation toast
  showToast('✅ Backup downloaded! Save it somewhere safe.','var(--green)');
}

function restoreData(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const backup=JSON.parse(e.target.result);
      // Validate it's a Crafty Planner backup
      if(!backup.data||!backup.appName){
        showToast('❌ Invalid backup file — not a Crafty Planner backup.','var(--red)');
        input.value='';return;
      }
      const {orders=[],expenses=[],products=[],recipes=[]}=backup.data;
      const totalRecords=(orders.length)+(expenses.length)+(products.length)+(recipes.length);
      const exportedDate=backup.exportedAt?new Date(backup.exportedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'Unknown date';
      // Confirm before overwriting
      openModal(`<div class="cm-confirm">
        <div style="font-size:40px;margin-bottom:12px">📂</div>
        <p style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">Restore Backup?</p>
        <p style="font-size:14px;color:var(--text2);margin-bottom:6px">Backed up: <strong>${exportedDate}</strong></p>
        <div style="background:var(--input-bg);border-radius:10px;padding:12px;margin-bottom:16px;text-align:left">
          <div style="font-size:13px;color:var(--text2);line-height:2">
            📋 ${orders.length} orders<br>
            💰 ${expenses.length} expenses<br>
            🏷️ ${products.length} products<br>
            📐 ${recipes.length} recipes
          </div>
        </div>
        <p style="font-size:13px;color:var(--red);margin-bottom:20px">⚠️ This will replace ALL your current data. This cannot be undone.</p>
        <div class="cm-confirm-actions">
          <button class="cm-cancel-btn" onclick="closeModal()">Cancel</button>
          <button class="cm-save-btn" id="confirmRestore" style="background:var(--blue)">Restore</button>
        </div>
      </div>`);
      document.getElementById('confirmRestore').onclick=()=>{
        S.orders=orders;
        S.expenses=expenses;
        S.products=products;
        S.recipes=recipes;
        save('orders');save('expenses');save('products');save('recipes');
        closeModal();
        render();
        showToast(`✅ Restored ${totalRecords} records successfully!`,'var(--green)');
        input.value='';
      };
    }catch(err){
      showToast('❌ Could not read backup file — it may be corrupted.','var(--red)');
      input.value='';
    }
  };
  reader.readAsText(file);
}

/* ── Toast notification ── */
function showToast(msg, color='var(--accent)'){
  const existing=document.getElementById('cpToast');
  if(existing)existing.remove();
  const t=document.createElement('div');
  t.id='cpToast';
  t.style.cssText=`position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:${color};color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:slideIn 0.3s ease;white-space:nowrap;max-width:90vw;text-align:center`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.4s';setTimeout(()=>t.remove(),400);},3000);
}

/* ── Phase 1 Notifications ── */
const NOTIF_KEY='cp-notifs-enabled';

function notifEnabled(){
  try{return localStorage.getItem(NOTIF_KEY)==='1';}catch{return false;}
}

function updateNotifToggleUI(enabled){
  const track=document.getElementById('notifTrack');
  const thumb=document.getElementById('notifThumb');
  const label=document.getElementById('notifLabel');
  if(!track)return;
  track.classList.toggle('notif-on',enabled);
  thumb.classList.toggle('notif-on',enabled);
  if(label)label.textContent=enabled?'Notifications On':'Notifications';
}

async function requestNotifPermission(){
  if(!('Notification' in window)){
    showToast('Notifications not supported on this browser','var(--amber)');
    return false;
  }
  if(Notification.permission==='granted')return true;
  if(Notification.permission==='denied'){
    showToast('Notifications blocked — enable in browser settings','var(--amber)');
    return false;
  }
  const perm=await Notification.requestPermission();
  return perm==='granted';
}

document.getElementById('notifToggle').addEventListener('click',async()=>{
  const currently=notifEnabled();
  if(!currently){
    // Turning ON
    const granted=await requestNotifPermission();
    if(!granted){updateNotifToggleUI(false);return;}
    try{localStorage.setItem(NOTIF_KEY,'1');}catch{}
    updateNotifToggleUI(true);
    showToast('🔔 Notifications enabled!','var(--green)');
    checkAndNotify();
  } else {
    // Turning OFF
    try{localStorage.setItem(NOTIF_KEY,'0');}catch{}
    updateNotifToggleUI(false);
    showToast('🔕 Notifications disabled','var(--text3)');
  }
});

function fireNotification(title, body, tag){
  if(Notification.permission!=='granted')return;
  try{
    const n=new Notification(title,{
      body,
      tag,
      icon:'android-icon-192.png',
      badge:'android-icon-48.png',
      silent:false
    });
    n.onclick=()=>{window.focus();n.close();};
  }catch(e){console.warn('Notification failed:',e);}
}

function checkAndNotify(){
  if(!notifEnabled())return;
  if(Notification.permission!=='granted')return;

  const td=todayStr();
  const tomorrow=new Date(new Date(td+'T12:00:00').getTime()+864e5).toISOString().slice(0,10);
  const activeOrders=S.orders.filter(o=>o.status!=='Delivered');

  const overdue=activeOrders.filter(o=>o.dueDate&&o.dueDate<td);
  const dueToday=activeOrders.filter(o=>o.dueDate===td);
  const dueTomorrow=activeOrders.filter(o=>o.dueDate===tomorrow);

  // Only fire once per day per type
  const lastCheck=localStorage.getItem('cp-notif-lastcheck');
  if(lastCheck===td)return; // Already checked today
  try{localStorage.setItem('cp-notif-lastcheck',td);}catch{}

  // Overdue — highest priority
  if(overdue.length){
    const names=overdue.slice(0,2).map(o=>o.customer).join(', ')+(overdue.length>2?` +${overdue.length-2} more`:'');
    setTimeout(()=>fireNotification(
      `⚠️ ${overdue.length} Overdue Order${overdue.length>1?'s':''}`,
      `${names} — open Crafty Planner to action these now.`,
      'cp-overdue'
    ),500);
  }

  // Due today
  if(dueToday.length){
    const names=dueToday.slice(0,2).map(o=>o.customer).join(', ')+(dueToday.length>2?` +${dueToday.length-2} more`:'');
    setTimeout(()=>fireNotification(
      `📅 ${dueToday.length} Order${dueToday.length>1?'s':''} Due Today`,
      `${names}`,
      'cp-today'
    ),1200);
  }

  // Due tomorrow
  if(dueTomorrow.length){
    const names=dueTomorrow.slice(0,2).map(o=>o.customer).join(', ')+(dueTomorrow.length>2?` +${dueTomorrow.length-2} more`:'');
    setTimeout(()=>fireNotification(
      `🔔 ${dueTomorrow.length} Order${dueTomorrow.length>1?'s':''} Due Tomorrow`,
      `${names} — make sure you're on track!`,
      'cp-tomorrow'
    ),2000);
  }

  // All good
  if(!overdue.length&&!dueToday.length&&!dueTomorrow.length&&activeOrders.length>0){
    // No urgent orders — silent, no notification needed
  }
}

function initNotifications(){
  // Restore toggle state
  const enabled=notifEnabled();
  // If previously enabled but permission was revoked, reset
  if(enabled&&Notification.permission!=='granted'){
    try{localStorage.setItem(NOTIF_KEY,'0');}catch{}
    updateNotifToggleUI(false);
    return;
  }
  updateNotifToggleUI(enabled);
  // Run check on app open
  if(enabled)checkAndNotify();
}

loadTheme().then(()=>loadAll()).then(()=>{injectLogos();loadCustomTheme();render();initNotifications();
  try{if(!localStorage.getItem('cp-guided')){openUserGuide();localStorage.setItem('cp-guided','1');}}catch{}
});
