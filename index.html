  document.getElementById('productsContent').innerHTML='<div class="cm-card-grid">'+l.map(p=>{const ss=stockStatus(p),sl=stockLabel(p);return`<div class="cm-card"><div class="cm-product-header"><div><span class="cm-cat-pill">${p.category}</span><h3 class="cm-product-name">${esc(p.name)}</h3></div><span class="cm-product-price">${fmt$(p.basePrice)}</span></div>${p.description?`<p class="cm-product-desc">${esc(p.description)}</p>`:''}<span class="cm-inv-stock-badge ${ss}">${ss==='out'?'🔴':ss==='low'?'🟡':ss==='good'?'🟢':'⚪'} ${sl}</span><div class="cm-product-actions"><button class="cm-edit-btn" data-ep="${p.id}">Edit</button><button class="cm-edit-btn" data-ip="${p.id}">Stock</button><button class="cm-delete-btn" data-dp="${p.id}">✕</button></div></div>`;}).join('')+'</div>';}
document.getElementById('tab-products').addEventListener('click',e=>{const cf=e.target.closest('[data-pcf]');if(cf){S.prodCatFilter=cf.dataset.pcf;render();return;}const ed=e.target.closest('[data-ep]');if(ed){const p=S.products.find(x=>x.id===ed.dataset.ep);if(p)openProductForm(p);return;}const adj=e.target.closest('[data-ip]');if(adj){const p=S.products.find(x=>x.id===adj.dataset.ip);if(p)openAdjustStock(p);return;}const dl=e.target.closest('[data-dp]');if(dl){const p=S.products.find(x=>x.id===dl.dataset.dp);if(p)openConfirm(`Delete "${p.name}"?`,()=>{S.products=S.products.filter(x=>x.id!==p.id);save('products');render();});}});

function openProductForm(data){const d=data||{id:uid(),name:'',basePrice:'',category:'Custom',description:'',trackStock:false,stock:0,lowStockAt:3};const co=PRODUCT_CATS.map(c=>`<option ${c===d.category?'selected':''}>${c}</option>`).join('');openModal(`<h2 class="cm-form-title">${data?'Edit Product':'New Product'}</h2><div class="cm-form-grid"><label class="cm-form-label">Name *<input class="cm-form-input" id="f-pn" value="${esc(d.name)}" placeholder="Product name"></label><label class="cm-form-label">Price *<input class="cm-form-input" id="f-pp" type="number" step="0.01" min="0" value="${d.basePrice}" placeholder="0.00"></label><label class="cm-form-label">Category<select class="cm-form-input" id="f-pc">${co}</select></label><label class="cm-form-label full">Description<textarea class="cm-form-input" id="f-pd" placeholder="Details...">${esc(d.description||'')}</textarea></label></div><div style="margin-top:16px;padding:14px;background:var(--input-bg);border-radius:12px;border:1px solid var(--border2)"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><input type="checkbox" id="f-ts" ${d.trackStock?'checked':''} style="width:18px;height:18px;accent-color:var(--accent)"><label for="f-ts" style="font-size:14px;font-weight:600;color:var(--text);cursor:pointer">📦 Track Inventory for this product</label></div><div class="cm-form-grid" id="stockFields" style="${d.trackStock?'':'opacity:0.4;pointer-events:none'}"><label class="cm-form-label">Current Stock<input class="cm-form-input" id="f-sk" type="number" min="0" step="1" value="${d.stock||0}" placeholder="0"></label><label class="cm-form-label">Low Stock Alert at<input class="cm-form-input" id="f-ls" type="number" min="0" step="1" value="${d.lowStockAt||3}" placeholder="3"></label></div></div><div class="cm-form-actions"><button class="cm-cancel-btn" onclick="closeModal()">Cancel</button><button class="cm-save-btn" id="sP">${data?'Save':'Add Product'}</button></div>`);
  document.getElementById('f-ts').onchange=e=>{document.getElementById('stockFields').style.opacity=e.target.checked?'1':'0.4';document.getElementById('stockFields').style.pointerEvents=e.target.checked?'':'none';};
  document.getElementById('sP').onclick=()=>{const n=document.getElementById('f-pn').value.trim(),bp=document.getElementById('f-pp').value;if(!n||!bp)return;const ts=document.getElementById('f-ts').checked;const o={id:d.id,name:n,basePrice:bp,category:document.getElementById('f-pc').value,description:document.getElementById('f-pd').value,trackStock:ts,stock:ts?Number(document.getElementById('f-sk').value)||0:d.stock||0,lowStockAt:Number(document.getElementById('f-ls').value)||3};if(data)S.products=S.products.map(x=>x.id===o.id?o:x);else S.products.unshift(o);save('products');closeModal();render();};}

/* ── Inventory tab ── */
function supplyStatus(s){if((s.stock||0)<=0)return'out';if((s.stock||0)<=Number(s.lowStockAt||5))return'low';return'good';}

function renderInventory(){
  const toggle=`<div class="cm-inv-tab-toggle">
    <button class="cm-inv-tab-btn ${S.invTab==='products'?'active':''}" onclick="S.invTab='products';renderInventory()">📦 Products</button>
    <button class="cm-inv-tab-btn ${S.invTab==='supplies'?'active':''}" onclick="S.invTab='supplies';renderInventory()">🧪 Supplies</button>
  </div>`;

  if(S.invTab==='supplies'){
    const sups=S.supplies||[];
    const out=sups.filter(s=>supplyStatus(s)==='out');
    const low=sups.filter(s=>supplyStatus(s)==='low');
    const good=sups.filter(s=>supplyStatus(s)==='good');
    const summaryH=`<div class="cm-sup-summary">
      <div class="cm-sup-sum-card"><div class="cm-sup-sum-val" style="color:var(--red)">${out.length}</div><div class="cm-sup-sum-label">Out of Stock</div></div>
      <div class="cm-sup-sum-card"><div class="cm-sup-sum-val" style="color:var(--amber)">${low.length}</div><div class="cm-sup-sum-label">Low Stock</div></div>
      <div class="cm-sup-sum-card"><div class="cm-sup-sum-val" style="color:var(--green)">${good.length}</div><div class="cm-sup-sum-label">Well Stocked</div></div>
    </div>`;
    const addBtn=`<div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="cm-add-btn" onclick="openSupplyForm(null)">+ Add Supply</button></div>`;
    if(!sups.length){
      document.getElementById('inventoryContent').innerHTML=toggle+summaryH+addBtn+`<div class="cm-empty"><div class="cm-empty-icon">🧪</div><p class="cm-empty-text">No supplies yet — add your first!</p></div>`;
      return;
    }
    // Bar chart cards
    const maxStock=Math.max(...sups.map(s=>Math.max(s.stock||0,s.maxStock||s.stock||1)),1);
    const cardsH='<div class="cm-inv-grid">'+sups.map(s=>{
      const ss=supplyStatus(s);
      const pct=Math.min(100,Math.max(0,((s.stock||0)/Math.max(s.maxStock||s.stock||1,1))*100));
      const barColor=ss==='out'?'out':ss==='low'?'low':'good';
      return`<div class="cm-supply-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--text);font-weight:600">${esc(s.name)}</div>
            <div style="font-size:12px;color:var(--text3)">${esc(s.unit)} · Alert at ${s.lowStockAt||5}</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:${ss==='out'?'var(--red)':ss==='low'?'var(--amber)':'var(--green)'};line-height:1">${s.stock||0}</div>
            <div style="font-size:11px;color:var(--text4)">${esc(s.unit)}</div>
          </div>
        </div>
        <div class="cm-supply-bar-wrap"><div class="cm-supply-bar ${barColor}" style="width:${pct}%"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text4);margin-bottom:10px">
          <span>0</span><span>${s.maxStock||s.stock||0} ${esc(s.unit)} max</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
          <button class="cm-inv-adj-btn" data-sm="${s.id}" style="width:32px;height:32px">−</button>
          <input class="cm-inv-adj-input" id="ss-${s.id}" type="number" min="0" value="${s.stock||0}" style="flex:1;text-align:center">
          <button class="cm-inv-adj-btn" data-sp="${s.id}" style="width:32px;height:32px">+</button>
          <button class="cm-save-btn" data-ss="${s.id}" style="padding:6px 12px;font-size:12px">Save</button>
        </div>
        <div style="display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--border3)">
          <button class="cm-save-btn" data-sr="${s.id}" style="flex:1;font-size:12px;background:var(--green)">+ Restock</button>
          <button class="cm-edit-btn" data-se="${s.id}" style="font-size:12px">Edit</button>
          <button class="cm-delete-btn" data-sd="${s.id}" style="font-size:16px">🗑️</button>
        </div>
      </div>`;
    }).join('')+'</div>';
    document.getElementById('inventoryContent').innerHTML=toggle+summaryH+addBtn+cardsH;
    return;
  }

  // ── Products tab (unchanged) ──
  const tracked=S.products.filter(p=>p.trackStock);
  const outCount=tracked.filter(p=>p.stock<=0).length;
  const lowCount=tracked.filter(p=>p.stock>0&&p.stock<=Number(p.lowStockAt||3)).length;
  const goodCount=tracked.filter(p=>p.stock>Number(p.lowStockAt||3)).length;
  const filterBtns=['All','In Stock','Low Stock','Out of Stock','Untracked'].map(f=>`<button class="cm-filter-btn ${S.invFilter===f?'active':''}" data-ivf="${f}">${f}</button>`).join('');
  let items=S.products;
  if(S.invFilter==='In Stock')items=items.filter(p=>p.trackStock&&p.stock>Number(p.lowStockAt||3));
  else if(S.invFilter==='Low Stock')items=items.filter(p=>p.trackStock&&p.stock>0&&p.stock<=Number(p.lowStockAt||3));
  else if(S.invFilter==='Out of Stock')items=items.filter(p=>p.trackStock&&p.stock<=0);
  else if(S.invFilter==='Untracked')items=items.filter(p=>!p.trackStock);
  const cardsH=items.length?'<div class="cm-inv-grid">'+items.map(p=>{const ss=stockStatus(p);const adjH=p.trackStock?`<div class="cm-inv-adjust"><button class="cm-inv-adj-btn" data-im="${p.id}">−</button><input class="cm-inv-adj-input" id="si-${p.id}" type="number" min="0" value="${p.stock||0}"><button class="cm-inv-adj-btn" data-ip2="${p.id}">+</button></div>`:'';return`<div class="cm-inv-card ${ss}"><div class="cm-inv-card-name">${esc(p.name)}</div><div class="cm-inv-card-cat">${p.category} · ${fmt$(p.basePrice)}</div><div class="cm-inv-stock-row"><div>${p.trackStock?`<div class="cm-inv-stock-num ${ss}">${p.stock}</div><div class="cm-inv-threshold">Alert at ${p.lowStockAt||3} units</div>`:`<div class="cm-inv-stock-num untracked">Not tracked</div>`}</div>${adjH}</div><div style="display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border3)"><button class="cm-edit-btn" style="flex:1;font-size:12px" data-ie="${p.id}">Edit</button>${p.trackStock?`<button class="cm-save-btn" style="flex:1;font-size:12px;padding:6px 10px" data-is="${p.id}">Save Stock</button>`:''}<button class="cm-delete-btn" data-id="${p.id}" style="font-size:16px" title="Delete product">🗑️</button></div></div>`;}).join('')+'</div>':'<div class="cm-empty"><div class="cm-empty-icon">📦</div><p class="cm-empty-text">No items match this filter</p></div>';
  document.getElementById('inventoryContent').innerHTML=toggle+`<div class="cm-inv-summary"><div class="cm-inv-sum-card"><div class="cm-inv-sum-val" style="color:var(--red)">${outCount}</div><div class="cm-inv-sum-label">Out of Stock</div></div><div class="cm-inv-sum-card"><div class="cm-inv-sum-val" style="color:var(--amber)">${lowCount}</div><div class="cm-inv-sum-label">Low Stock</div></div><div class="cm-inv-sum-card"><div class="cm-inv-sum-val" style="color:var(--green)">${goodCount}</div><div class="cm-inv-sum-label">Well Stocked</div></div></div><div class="cm-filter-bar">${filterBtns}</div>${cardsH}`;
}

document.getElementById('tab-inventory').addEventListener('click',e=>{
  const ff=e.target.closest('[data-ivf]');if(ff){S.invFilter=ff.dataset.ivf;renderInventory();return;}
  const ie=e.target.closest('[data-ie]');if(ie){const p=S.products.find(x=>x.id===ie.dataset.ie);if(p)openProductForm(p);return;}
  const im=e.target.closest('[data-im]');if(im){const p=S.products.find(x=>x.id===im.dataset.im);if(p){p.stock=Math.max(0,(p.stock||0)-1);const inp=document.getElementById('si-'+p.id);if(inp)inp.value=p.stock;save('products');renderBadges();}return;}
  const ip2=e.target.closest('[data-ip2]');if(ip2){const p=S.products.find(x=>x.id===ip2.dataset.ip2);if(p){p.stock=(p.stock||0)+1;const inp=document.getElementById('si-'+p.id);if(inp)inp.value=p.stock;save('products');renderBadges();}return;}
  const is=e.target.closest('[data-is]');if(is){const p=S.products.find(x=>x.id===is.dataset.is);if(p){const inp=document.getElementById('si-'+p.id);if(inp)p.stock=Math.max(0,Number(inp.value)||0);save('products');renderInventory();renderBadges();}return;}
  const id=e.target.closest('[data-id]');if(id){const p=S.products.find(x=>x.id===id.dataset.id);if(p)openConfirm(`Delete "${p.name}"?`,()=>{S.products=S.products.filter(x=>x.id!==p.id);save('products');render();});return;}
  // Supply handlers
  const sm=e.target.closest('[data-sm]');if(sm){const s=S.supplies.find(x=>x.id===sm.dataset.sm);if(s){s.stock=Math.max(0,(s.stock||0)-1);const inp=document.getElementById('ss-'+s.id);if(inp)inp.value=s.stock;save('supplies');renderBadges();}return;}
  const sp=e.target.closest('[data-sp]');if(sp){const s=S.supplies.find(x=>x.id===sp.dataset.sp);if(s){s.stock=(s.stock||0)+1;const inp=document.getElementById('ss-'+s.id);if(inp)inp.value=s.stock;save('supplies');renderBadges();}return;}
  const ss=e.target.closest('[data-ss]');if(ss){const s=S.supplies.find(x=>x.id===ss.dataset.ss);if(s){const inp=document.getElementById('ss-'+s.id);if(inp){s.stock=Math.max(0,Number(inp.value)||0);if(s.stock>s.maxStock)s.maxStock=s.stock;}save('supplies');renderInventory();renderBadges();}return;}
  const sr=e.target.closest('[data-sr]');if(sr){const s=S.supplies.find(x=>x.id===sr.dataset.sr);if(s)openRestockForm(s);return;}
  const se=e.target.closest('[data-se]');if(se){const s=S.supplies.find(x=>x.id===se.dataset.se);if(s)openSupplyForm(s);return;}
  const sd=e.target.closest('[data-sd]');if(sd){const s=S.supplies.find(x=>x.id===sd.dataset.sd);if(s)openConfirm(`Delete "${s.name}"?`,()=>{S.supplies=S.supplies.filter(x=>x.id!==s.id);save('supplies');renderInventory();renderBadges();});return;}
});

function openSupplyForm(data){
  const d=data||{id:uid(),name:'',unit:'each',stock:0,maxStock:0,lowStockAt:5};
  openModal(`<h2 class="cm-form-title">${data?'Edit Supply':'New Supply'}</h2>
<div class="cm-form-grid">
  <label class="cm-form-label full">Supply Name *<input class="cm-form-input" id="sf-name" value="${esc(d.name)}" placeholder="e.g. Pencils, Soy Wax, Kraft Boxes"></label>
  <label class="cm-form-label">Unit *<input class="cm-form-input" id="sf-unit" value="${esc(d.unit)}" placeholder="each, oz, g, cups..."></label>
  <label class="cm-form-label">Current Stock<input class="cm-form-input" id="sf-stock" type="number" min="0" step="any" value="${d.stock||0}"></label>
  <label class="cm-form-label">Max / Full Stock <span style="color:var(--text4);font-size:11px">(for bar chart)</span><input class="cm-form-input" id="sf-max" type="number" min="0" step="any" value="${d.maxStock||d.stock||0}" placeholder="e.g. 100"></label>
  <label class="cm-form-label">Low Stock Alert at<input class="cm-form-input" id="sf-low" type="number" min="0" step="any" value="${d.lowStockAt||5}"></label>
</div>
<div class="cm-form-actions"><button class="cm-cancel-btn" onclick="closeModal()">Cancel</button><button class="cm-save-btn" id="sf-save">${data?'Save Changes':'Add Supply'}</button></div>`);
  document.getElementById('sf-save').onclick=()=>{
    const name=document.getElementById('sf-name').value.trim();
    if(!name){showToast('Name is required','var(--red)');return;}
    const stock=Number(document.getElementById('sf-stock').value)||0;
    const maxStock=Number(document.getElementById('sf-max').value)||stock;
    const s={id:d.id,name,unit:document.getElementById('sf-unit').value||'each',stock,maxStock:Math.max(stock,maxStock),lowStockAt:Number(document.getElementById('sf-low').value)||5};
    if(data)S.supplies=S.supplies.map(x=>x.id===s.id?s:x);else S.supplies.unshift(s);
    save('supplies');closeModal();renderInventory();renderBadges();
  };
}

function openRestockForm(s){
  openModal(`<h2 class="cm-form-title">+ Restock — ${esc(s.name)}</h2>
<p style="font-size:13px;color:var(--text3);margin-bottom:16px">Current stock: <strong>${s.stock||0} ${esc(s.unit)}</strong></p>
<div class="cm-form-grid">
  <label class="cm-form-label">Quantity to Add *<input class="cm-form-input" id="rs-qty" type="number" min="0" step="any" placeholder="0"></label>
  <label class="cm-form-label">Total Cost <span style="color:var(--text4);font-weight:400">(optional)</span><input class="cm-form-input" id="rs-cost" type="number" min="0" step="0.01" placeholder="0.00"></label>
</div>
<div style="margin:4px 0 16px;padding:12px;background:var(--input-bg);border-radius:10px;border:1px solid var(--border2)">
  <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;color:var(--text2)">
    <input type="checkbox" id="rs-exp" style="width:18px;height:18px;accent-color:var(--accent)">
    <span>Log as <strong>Materials</strong> expense in Expenses tab</span>
  </label>
</div>
<div class="cm-form-actions"><button class="cm-cancel-btn" onclick="closeModal()">Cancel</button><button class="cm-save-btn" id="rs-save">Restock</button></div>`);
  document.getElementById('rs-save').onclick=()=>{
    const qty=Number(document.getElementById('rs-qty').value)||0;
    if(qty<=0){showToast('Enter a quantity','var(--red)');return;}
    s.stock=(s.stock||0)+qty;
    if(s.stock>s.maxStock)s.maxStock=s.stock;
    save('supplies');
    // Log expense if checked
    if(document.getElementById('rs-exp').checked){
      const cost=Number(document.getElementById('rs-cost').value)||0;
      if(cost>0){
        S.expenses.unshift({id:uid(),description:`Restock: ${s.name} (${qty} ${s.unit})`,amount:cost,category:'Materials',date:todayStr()});
        save('expenses');
        showToast(`✅ Restocked + $${cost.toFixed(2)} logged as expense`,'var(--green)');
      } else {
        showToast(`✅ Restocked ${qty} ${s.unit} of ${s.name}`,'var(--green)');
      }
    } else {
      showToast(`✅ Restocked ${qty} ${s.unit} of ${s.name}`,'var(--green)');
    }
    closeModal();renderInventory();renderBadges();
  };
}

function openAdjustStock(p){openModal(`<h2 class="cm-form-title">📦 Adjust Stock — ${esc(p.name)}</h2><p style="color:var(--text3);font-size:13px;margin-bottom:20px">${p.trackStock?`Current stock: <strong>${p.stock}</strong> units`:'Stock tracking is off for this product. Enable it in Edit Product.'}</p>${p.trackStock?`<div class="cm-form-grid"><label class="cm-form-label full">New Stock Quantity<input class="cm-form-input" id="adj-qty" type="number" min="0" step="1" value="${p.stock||0}" placeholder="0"></label></div><div class="cm-form-actions"><button class="cm-cancel-btn" onclick="closeModal()">Cancel</button><button class="cm-save-btn" id="adjSave">Save</button></div>`:`<div class="cm-form-actions"><button class="cm-cancel-btn" onclick="closeModal()">Close</button><button class="cm-save-btn" onclick="closeModal();openProductForm(S.products.find(x=>x.id==='${p.id}'))">Edit Product</button></div>`}`);
  if(p.trackStock){document.getElementById('adjSave').onclick=()=>{p.stock=Math.max(0,Number(document.getElementById('adj-qty').value)||0);save('products');closeModal();render();};}
}

/* ── Recipes ── */
const RECIPE_CATS=['Baked Goods','Candles','Soap','Jewelry','Crafts','Other'];
const ING_UNITS=['cups','tbsp','tsp','oz','g','kg','lb','ml','L','each','pinch','drops','sticks','sheets'];

function fmtAmt(n){const r=Math.round(n*1000)/1000;return r%1===0?r.toString():r.toFixed(3).replace(/\.?0+$/,'');}

function renderRecipes(){
  const cats=['All',...RECIPE_CATS];
  document.getElementById('recipeCatFilters').innerHTML=cats.map(c=>`<button class="cm-filter-btn ${S.recipeCatFilter===c?'active':''}" data-rcf="${c}">${c}</button>`).join('');
  let list=S.recipeCatFilter==='All'?S.recipes:S.recipes.filter(r=>r.category===S.recipeCatFilter);
  if(!list.length){
    document.getElementById('recipesContent').innerHTML=`<div class="cm-empty"><div class="cm-empty-icon">📐</div><p class="cm-empty-text">${S.recipeCatFilter==='All'?'No recipes yet — add your first batch recipe!':'No recipes in this category'}</p>${S.recipeCatFilter==='All'?`<button class="cm-add-btn" style="margin-top:12px" onclick="openRecipeForm(null)">+ Add Recipe</button>`:''}</div>`;
    return;
  }
  document.getElementById('recipesContent').innerHTML='<div class="cm-card-grid">'+list.map(r=>{
    const ingPreview=r.ingredients.slice(0,4).map(i=>`${fmtAmt(i.amount)} ${i.unit} ${esc(i.name)}`).join(', ')+(r.ingredients.length>4?` +${r.ingredients.length-4} more`:'');
    return`<div class="cm-recipe-card"><div class="cm-product-header"><div><span class="cm-cat-pill">${r.category}</span><h3 class="cm-recipe-name">${esc(r.name)}</h3></div><div style="text-align:right"><div class="cm-recipe-yield">${r.baseYield}</div><div style="font-size:11px;color:var(--text3)">${esc(r.yieldUnit)}</div></div></div><div class="cm-recipe-meta"><span>📋 ${r.ingredients.length} ingredient${r.ingredients.length!==1?'s':''}</span>${r.notes?'<span>📝 Has notes</span>':''}</div><div class="cm-recipe-ing-list">${ingPreview}</div><div class="cm-recipe-actions"><button class="cm-scale-btn" data-rs="${r.id}">⚖️ Scale Batch</button><button class="cm-edit-btn" data-re="${r.id}">Edit</button><button class="cm-delete-btn" data-rd="${r.id}">✕</button></div></div>`;
  }).join('')+'</div>';
}

document.getElementById('tab-recipes').addEventListener('click',e=>{
  const cf=e.target.closest('[data-rcf]');if(cf){S.recipeCatFilter=cf.dataset.rcf;renderRecipes();return;}
  const rs=e.target.closest('[data-rs]');if(rs){const r=S.recipes.find(x=>x.id===rs.dataset.rs);if(r)openScaleModal(r);return;}

window.calcScale=function(rid){
  const r=S.recipes.find(x=>x.id===rid);if(!r)return;
  const target=Number(document.getElementById('sc-target')?.value)||r.baseYield;
  const mult=target/r.baseYield;
  const mEl=document.getElementById('sc-mult');if(mEl)mEl.textContent=Math.round(mult*100)/100+'×';
  const rows=r.ingredients.map(ing=>{
    const scaled=ing.amount*mult;
    return`<div class="cm-scale-ing-row"><span class="cm-scale-ing-name">${esc(ing.name)}</span><span class="cm-scale-ing-amt">${fmtAmt(scaled)} ${ing.unit}</span></div>`;
  }).join('');
  const res=document.getElementById('sc-result');if(!res)return;
  res.innerHTML=`<div class="cm-scale-result-title">Ingredients for ${fmtAmt(target)} ${esc(r.yieldUnit)}</div>${rows}`;
  if(r.notes)res.innerHTML+=`<div style="margin-top:12px;font-size:12px;color:var(--text3);font-style:italic">📝 ${esc(r.notes)}</div>`;
};

async function shareInvoice(){
  const invoiceEl=document.getElementById('modalBody').querySelector('.cm-invoice');
  if(!invoiceEl){showToast('❌ Invoice not found','var(--red)');return;}
  const shareBtn=document.querySelector('[onclick="shareInvoice()"]');
  if(shareBtn){shareBtn.textContent='⏳ Preparing...';shareBtn.disabled=true;}
  try{
    // Temporarily force light colors for clean image regardless of dark mode
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    if(isDark){invoiceEl.style.background='#fff';invoiceEl.style.color='#3d2e1f';}
    const canvas=await html2canvas(invoiceEl,{
      backgroundColor:'#ffffff',
      scale:2,
      useCORS:true,
      logging:false,
      width:invoiceEl.scrollWidth,
      height:invoiceEl.scrollHeight
    });
    if(isDark){invoiceEl.style.background='';invoiceEl.style.color='';}
    canvas.toBlob(async(blob)=>{
      if(!blob){showToast('❌ Could not generate image','var(--red)');return;}
      const file=new File([blob],'crafty-planner-invoice.png',{type:'image/png'});
      // Try native share sheet first (mobile)
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        try{
          await navigator.share({
            title:'Invoice — Crafty Planner',
            text:'Please find your invoice attached.',
            files:[file]
          });
          showToast('✅ Invoice shared!','var(--green)');
        }catch(err){
          if(err.name!=='AbortError')showToast('❌ Share failed','var(--red)');
        }
      } else if(navigator.share){
        // Share without file (some browsers)
        const url=URL.createObjectURL(blob);
        try{
          await navigator.share({title:'Invoice — Crafty Planner',text:'Your invoice from Crafty Planner.',url});
          showToast('✅ Invoice shared!','var(--green)');
        }catch(err){if(err.name!=='AbortError')downloadInvoiceImage(blob);}
        URL.revokeObjectURL(url);
      } else {
        // Fallback — download as image
        downloadInvoiceImage(blob);
      }
      if(shareBtn){shareBtn.textContent='📤 Share';shareBtn.disabled=false;}
    },'image/png');
  }catch(err){
    console.error(err);
    showToast('❌ Could not capture invoice','var(--red)');
    if(shareBtn){shareBtn.textContent='📤 Share';shareBtn.disabled=false;}
  }
}

function downloadInvoiceImage(blob){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='crafty-planner-invoice.png';
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 Invoice saved as image','var(--accent)');
}

function exportCSV(type){let csv='',fn='';if(type==='orders'){csv='Customer,Items,Price,Deposit,Due Date,Status,Notes,Created\n';S.orders.forEach(o=>{csv+=`"${(o.customer||'').replace(/"/g,'""')}","${(o.items||'').replace(/"/g,'""')}",${o.price||0},${o.deposit||0},${o.dueDate||''},${o.status},"${(o.notes||'').replace(/"/g,'""')}",${o.created||''}\n`;});fn='crafty_planner_orders.csv';}else if(type==='expenses'){csv='Date,Description,Amount,Category\n';S.expenses.forEach(e=>{csv+=`${e.date||''},"${(e.description||'').replace(/"/g,'""')}",${e.amount||0},${e.category||''}\n`;});fn='crafty_planner_expenses.csv';}else if(type==='customers'){const m={};S.orders.forEach(o=>{const k=o.customer.toLowerCase().trim();if(!m[k])m[k]={name:o.customer,orders:0,total:0,last:''};m[k].orders++;m[k].total+=Number(o.price||0);const d=o.dueDate||o.created||'';if(d>m[k].last)m[k].last=d;});csv='Customer,Orders,Total Spent,Last Order\n';Object.values(m).forEach(c=>{csv+=`"${c.name}",${c.orders},${c.total.toFixed(2)},${c.last}\n`;});fn='crafty_planner_customers.csv';}else{csv='Date,Description,Amount,Category,Type\n';S.orders.filter(o=>o.status==='Delivered').forEach(o=>{csv+=`${o.dueDate||o.created||''},"${(o.customer+': '+(o.items||'')).replace(/"/g,'""')}",${o.price||0},Income,Revenue\n`;});S.expenses.forEach(e=>{csv+=`${e.date||''},"${(e.description||'').replace(/"/g,'""')}",-${e.amount||0},${e.category||''},Expense\n`;});fn='crafty_planner_quicken.csv';}const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fn;a.click();URL.revokeObjectURL(url);}

function exportICal(){
  const orders=S.orders.filter(o=>o.dueDate&&o.status!=='Delivered');
  const allOrders=S.orders.filter(o=>o.dueDate);
  if(!allOrders.length){
    showToast('No orders with due dates to export','var(--amber)');
    return;
  }

  const pad=n=>String(n).padStart(2,'0');
  const icalDate=dateStr=>{
    // dateStr is YYYY-MM-DD — convert to iCal all-day format YYYYMMDD
    return dateStr.replace(/-/g,'');
  };
  const icalNow=()=>{
    const d=new Date();
    return`${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}${pad(d.getUTCSeconds())}Z`;
  };
  const escIcal=s=>(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
  const foldLine=line=>{
    // iCal spec: lines > 75 chars must be folded with CRLF + space
    const out=[];
    while(line.length>75){out.push(line.slice(0,75));line=' '+line.slice(75);}
    out.push(line);
    return out.join('\r\n');
  };

  const now=icalNow();
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Crafty Planner//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH',`X-WR-CALNAME:Crafty Planner Orders`,`X-WR-CALDESC:Order due dates from Crafty Planner`,'X-WR-TIMEZONE:America/New_York'];

  allOrders.forEach(o=>{
    const uid=`${o.id}@crafty-planner`;
    const dtstart=icalDate(o.dueDate);
    // All-day event ends next day in iCal
    const dtend=icalDate(new Date(new Date(o.dueDate+'T12:00:00').getTime()+864e5).toISOString().slice(0,10));

    // Build summary and description
    const statusLabel=o.status==='Delivered'?'✓ Delivered':o.status;
    const summary=`${escIcal(o.customer)} — ${escIcal((o.items||'Order').split(',')[0].trim())}`;
    const descParts=[
      `Customer: ${o.customer||'—'}`,
      `Items: ${o.items||'—'}`,
      `Price: ${fmt$(o.price)}`,
      o.deposit&&Number(o.deposit)>0?`Deposit: ${fmt$(o.deposit)}`:'',
      `Status: ${statusLabel}`,
      o.platform?`Platform: ${o.platform}`:'',
      o.tags&&o.tags.length?`Tags: ${o.tags.join(', ')}`:'',
      o.tracking?`Tracking: ${o.tracking}`:'',
      o.notes?`Notes: ${o.notes}`:'',
    ].filter(Boolean).join('\\n');

    lines.push('BEGIN:VEVENT');
    lines.push(foldLine(`UID:${uid}`));
    lines.push(`DTSTAMP:${now}`);
    lines.push(`DTSTART;VALUE=DATE:${dtstart}`);
    lines.push(`DTEND;VALUE=DATE:${dtend}`);
    lines.push(foldLine(`SUMMARY:${summary}`));
    lines.push(foldLine(`DESCRIPTION:${descParts}`));
    // Color via category — maps to standard iCal colors
    const colorMap={'Pending':'#f59e0b','In Progress':'#3b82f6','Complete':'#10b981','Delivered':'#8b7355'};
    const color=colorMap[o.status]||'#c4956a';
    lines.push(`COLOR:${color}`);
    // 1-day before alarm
    if(o.status!=='Delivered'){
      lines.push('BEGIN:VALARM');
      lines.push('TRIGGER:-P1D');
      lines.push('ACTION:DISPLAY');
      lines.push(foldLine(`DESCRIPTION:Due tomorrow: ${escIcal(o.customer)}`));
      lines.push('END:VALARM');
    }
    lines.push('END:VEVENT');
  });

  lines.push('END:VCALENDAR');
  const ical=lines.join('\r\n');
  const blob=new Blob([ical],{type:'text/calendar;charset=utf-8'});
  const date=todayStr().replace(/-/g,'');
  const filename=`crafty-planner-orders-${date}.ics`;

  // Try native share first (mobile), fallback to download
  if(navigator.share&&navigator.canShare){
    const file=new File([blob],filename,{type:'text/calendar'});
    if(navigator.canShare({files:[file]})){
      navigator.share({title:'Crafty Planner — Order Calendar',files:[file]})
        .then(()=>showToast('✅ Calendar exported!','var(--green)'))
        .catch(err=>{if(err.name!=='AbortError')downloadICal(blob,filename);});
      return;
    }
  }
  downloadICal(blob,filename);
}

function downloadICal(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
  showToast(`✅ Calendar file downloaded — open it to import into Google Calendar, Apple Calendar, or Outlook`,'var(--green)');
}
function openMonthlyReport(){
  // Build month options from available data + last 12 months

  S.orders.forEach(o=>{if(o.dueDate)months.add(o.dueDate.slice(0,7));if(o.created)months.add(o.created.slice(0,7));});
  S.expenses.forEach(e=>{if(e.date)months.add(e.date.slice(0,7));});

function calcMonthData(mk){
  const orders=S.orders.filter(o=>o.status==='Delivered'&&(o.dueDate||o.created||'').startsWith(mk));
  const expenses=S.expenses.filter(e=>(e.date||'').startsWith(mk));
  const rev=orders.reduce((s,o)=>s+Number(o.price||0),0);
  const exp=expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const profit=rev-exp;
  const expByCat={};
  expenses.forEach(e=>{expByCat[e.category]=(expByCat[e.category]||0)+Number(e.amount||0);});
  const expByCatArr=Object.entries(expByCat).sort((a,b)=>b[1]-a[1]);
  const itemCounts={};
  orders.forEach(o=>{(o.items||'').split(',').map(s=>s.trim()).filter(Boolean).forEach(it=>{itemCounts[it]=(itemCounts[it]||0)+1;});});
  const topItems=Object.entries(itemCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  return{rev,exp,profit,orders,expenses,expByCat:expByCatArr,topItems};
}

function exportFullCSV(){
  const q=s=>`"${(s||'').toString().replace(/"/g,'""')}"`;
  const rows=[];
  // Header
  rows.push(['Type','Date','Reference','Description','Amount','Category','Status','Customer','Platform','Tags','Tracking','Notes','Internal Notes','Created'].join(','));

  // Orders
  S.orders.forEach(o=>{
    rows.push([
      q('Order'),
      q(o.dueDate||o.created||''),
      q(o.id),
      q(o.items||''),
      Number(o.price||0).toFixed(2),
      q(o.platform||''),
      q(o.status||''),
      q(o.customer||''),
      q(o.platform||''),
      q((o.tags||[]).join(', ')),
      q(o.tracking||''),
      q(o.notes||''),
      q(o.internalNote||''),
      q(o.created||'')
    ].join(','));
    // Deposit as its own row if present
    if(Number(o.deposit)>0){
      rows.push([
        q('Deposit'),
        q(o.dueDate||o.created||''),
        q(o.id),
        q(`Deposit — ${o.customer||''}`),
        Number(o.deposit||0).toFixed(2),
        q(''),
        q(o.status||''),
        q(o.customer||''),
        q(o.platform||''),
        q(''),q(''),q(''),q(''),
        q(o.created||'')
      ].join(','));
    }
  });

  // Expenses
  S.expenses.forEach(e=>{
    rows.push([
      q('Expense'),
      q(e.date||''),
      q(e.id),
      q(e.description||''),
      (-Number(e.amount||0)).toFixed(2),
      q(e.category||''),
      q(''),q(''),q(''),q(''),q(''),
      q(''),q(''),
      q(e.date||'')
    ].join(','));
  });

  // Products
  S.products.forEach(p=>{
    rows.push([
      q('Product'),
      q(''),
      q(p.id),
      q(p.name||''),
      Number(p.basePrice||0).toFixed(2),
      q(p.category||''),
      q(p.trackStock?`Stock: ${p.stock}`:'Not tracked'),
      q(''),q(''),q(''),q(''),
      q(p.description||''),q(''),q('')
    ].join(','));
  });

  // Recipes
  S.recipes.forEach(r=>{
    const ingList=(r.ingredients||[]).map(i=>`${i.amount} ${i.unit} ${i.name}`).join('; ');
    rows.push([
      q('Recipe'),
      q(''),
      q(r.id),
      q(r.name||''),
      q(''),
      q(r.category||''),
      q(`Yield: ${r.baseYield} ${r.yieldUnit}`),
      q(''),q(''),q(''),q(''),
      q(ingList),
      q(r.notes||''),
      q('')
    ].join(','));
  });

  const csv=rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=todayStr().replace(/-/g,'');
  a.href=url;
  a.download=`crafty-planner-full-export-${date}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  const total=S.orders.length+S.expenses.length+S.products.length+S.recipes.length;
  showToast(`✅ Exported ${total} records to CSV`,'var(--green)');
}
/* ── Backup & Restore ── */
function backupData(){
  const backup={
    version:1,
    exportedAt:new Date().toISOString(),
    appName:'Crafty Planner',
    data:{
      orders:S.orders,
      expenses:S.expenses,
      products:S.products,
      recipes:S.recipes
    }
  };
  const json=JSON.stringify(backup,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=todayStr().replace(/-/g,'');
  a.href=url;
  a.download=`crafty-planner-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  // Show confirmation toast
  showToast('✅ Backup downloaded! Save it somewhere safe.','var(--green)');
}

function restoreData(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const backup=JSON.parse(e.target.result);
      // Validate it's a Crafty Planner backup
      if(!backup.data||!backup.appName){
        showToast('❌ Invalid backup file — not a Crafty Planner backup.','var(--red)');
        input.value='';return;
      }
      const {orders=[],expenses=[],products=[],recipes=[]}=backup.data;
      const totalRecords=(orders.length)+(expenses.length)+(products.length)+(recipes.length);
      const exportedDate=backup.exportedAt?new Date(backup.exportedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'Unknown date';
      // Confirm before overwriting
      openModal(`<div class="cm-confirm">
        <div style="font-size:40px;margin-bottom:12px">📂</div>
        <p style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">Restore Backup?</p>
        <p style="font-size:14px;color:var(--text2);margin-bottom:6px">Backed up: <strong>${exportedDate}</strong></p>
        <div style="background:var(--input-bg);border-radius:10px;padding:12px;margin-bottom:16px;text-align:left">
          <div style="font-size:13px;color:var(--text2);line-height:2">
            📋 ${orders.length} orders<br>
            💰 ${expenses.length} expenses<br>
            🏷️ ${products.length} products<br>
            📐 ${recipes.length} recipes
          </div>
        </div>
        <p style="font-size:13px;color:var(--red);margin-bottom:20px">⚠️ This will replace ALL your current data. This cannot be undone.</p>
        <div class="cm-confirm-actions">
          <button class="cm-cancel-btn" onclick="closeModal()">Cancel</button>
          <button class="cm-save-btn" id="confirmRestore" style="background:var(--blue)">Restore</button>
        </div>
      </div>`);
      document.getElementById('confirmRestore').onclick=()=>{
        S.orders=orders;
        S.expenses=expenses;
        S.products=products;
        S.recipes=recipes;
        save('orders');save('expenses');save('products');save('recipes');
        closeModal();
        render();
        showToast(`✅ Restored ${totalRecords} records successfully!`,'var(--green)');
        input.value='';
      };
    }catch(err){
      showToast('❌ Could not read backup file — it may be corrupted.','var(--red)');
      input.value='';
    }
  };
  reader.readAsText(file);
}

/* ── Toast notification ── */
function showToast(msg, color='var(--accent)'){
  const existing=document.getElementById('cpToast');
  if(existing)existing.remove();
  const t=document.createElement('div');
  t.id='cpToast';
  t.style.cssText=`position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:${color};color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:slideIn 0.3s ease;white-space:nowrap;max-width:90vw;text-align:center`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.4s';setTimeout(()=>t.remove(),400);},3000);
}

async function handleReceiptImage(input){
  const file=input.files[0];
  if(!file)return;
  const imgUrl=URL.createObjectURL(file);
  const img=new Image();
  img.onload=()=>openCropUI(img,imgUrl,file);
  img.src=imgUrl;
}

function openCropUI(img,imgUrl,file){
  const overlay=document.createElement('div');
  overlay.id='rcpt-crop-overlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;';

  const bar=document.createElement('div');
  bar.style.cssText='padding:10px 16px;background:rgba(0,0,0,0.85);color:#fff;font-size:13px;text-align:center;flex-shrink:0;';
  bar.innerHTML='<strong>Drag to select the itemized area</strong><br><span style="font-size:11px;opacity:0.7">Rotate if needed · Draw a box around just the line items</span>';

  const canvasWrap=document.createElement('div');
  canvasWrap.style.cssText='flex:1;overflow:auto;position:relative;display:flex;align-items:center;justify-content:center;background:#111;';

  const canvas=document.createElement('canvas');
  canvas.style.cssText='display:block;touch-action:none;cursor:crosshair;max-width:100%;';
  canvasWrap.appendChild(canvas);

  const actions=document.createElement('div');
  actions.style.cssText='padding:10px 12px;background:rgba(0,0,0,0.9);display:flex;gap:8px;flex-shrink:0;align-items:center;';
  actions.innerHTML=`
    <button id="crop-cancel" style="padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.3);background:none;color:#fff;font-size:14px;cursor:pointer">✕</button>
    <button id="crop-ccw" style="padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.3);background:none;color:#fff;font-size:18px;cursor:pointer" title="Rotate left">↺</button>
    <button id="crop-cw" style="padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.3);background:none;color:#fff;font-size:18px;cursor:pointer" title="Rotate right">↻</button>
    <button id="crop-confirm" style="flex:1;padding:10px;border-radius:12px;border:none;background:#c4956a;color:#fff;font-size:14px;font-weight:600;cursor:pointer;opacity:0.5" disabled>✅ Scan Selection</button>`;

  overlay.appendChild(bar);
  overlay.appendChild(canvasWrap);
  overlay.appendChild(actions);
  document.body.appendChild(overlay);

  let rotation=0;
  let drag={active:false,sx:0,sy:0,ex:0,ey:0};
  let scale=1;

  const redrawBase=()=>{
    const isRotated=rotation===90||rotation===270;
    const srcW=isRotated?img.naturalHeight:img.naturalWidth;
    const srcH=isRotated?img.naturalWidth:img.naturalHeight;
    const maxW=window.innerWidth;
    const maxH=window.innerHeight-140;
    scale=Math.min(maxW/srcW,maxH/srcH,1);
    canvas.width=srcW*scale;
    canvas.height=srcH*scale;
    const ctx=canvas.getContext('2d');
    ctx.save();
    ctx.translate(canvas.width/2,canvas.height/2);
    ctx.rotate(rotation*Math.PI/180);
    if(isRotated){
      ctx.drawImage(img,-img.naturalWidth*scale/2,-img.naturalHeight*scale/2,img.naturalWidth*scale,img.naturalHeight*scale);
    } else {
      ctx.drawImage(img,-canvas.width/2,-canvas.height/2,canvas.width,canvas.height);
    }
    ctx.restore();
    drag={active:false,sx:0,sy:0,ex:0,ey:0};
    const btn=document.getElementById('crop-confirm');
    if(btn){btn.disabled=true;btn.style.opacity='0.5';}
  };
  redrawBase();

  const drawRotated=(ctx)=>{
    const isRotated=rotation===90||rotation===270;
    ctx.save();
    ctx.translate(canvas.width/2,canvas.height/2);
    ctx.rotate(rotation*Math.PI/180);
    if(isRotated){
      ctx.drawImage(img,-img.naturalWidth*scale/2,-img.naturalHeight*scale/2,img.naturalWidth*scale,img.naturalHeight*scale);
    } else {
      ctx.drawImage(img,-canvas.width/2,-canvas.height/2,canvas.width,canvas.height);
    }
    ctx.restore();
  };

  document.getElementById('crop-cancel').onclick=()=>{overlay.remove();URL.revokeObjectURL(imgUrl);};
  document.getElementById('crop-ccw').onclick=()=>{rotation=(rotation+270)%360;redrawBase();};
  document.getElementById('crop-cw').onclick=()=>{rotation=(rotation+90)%360;redrawBase();};

  const getPos=(e)=>{
    const r=canvas.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    return{x:Math.max(0,Math.min(canvas.width,clientX-r.left)),y:Math.max(0,Math.min(canvas.height,clientY-r.top))};
  };

  const drawSelection=()=>{
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawRotated(ctx);
    const x=Math.min(drag.sx,drag.ex),y=Math.min(drag.sy,drag.ey);
    const w=Math.abs(drag.ex-drag.sx),h=Math.abs(drag.ey-drag.sy);
    if(w<10||h<10)return;
    // Dim overlay
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    // Bright cutout
    const tmp=document.createElement('canvas');
    tmp.width=canvas.width;tmp.height=canvas.height;
    const tctx=tmp.getContext('2d');
    drawRotated(tctx);
    ctx.drawImage(tmp,x,y,w,h,x,y,w,h);
    // Border
    ctx.strokeStyle='#c4956a';ctx.lineWidth=2;ctx.setLineDash([6,4]);
    ctx.strokeRect(x,y,w,h);ctx.setLineDash([]);
    ctx.fillStyle='#c4956a';
    [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([cx,cy])=>ctx.fillRect(cx-4,cy-4,8,8));
  };

  const onStart=(e)=>{e.preventDefault();const p=getPos(e);drag={active:true,sx:p.x,sy:p.y,ex:p.x,ey:p.y};};
  const onMove=(e)=>{e.preventDefault();if(!drag.active)return;const p=getPos(e);drag.ex=p.x;drag.ey=p.y;drawSelection();};
  const onEnd=(e)=>{
    e.preventDefault();drag.active=false;
    const w=Math.abs(drag.ex-drag.sx),h=Math.abs(drag.ey-drag.sy);
    const btn=document.getElementById('crop-confirm');
    if(btn){btn.disabled=w<20||h<20;btn.style.opacity=w<20||h<20?'0.5':'1';}
  };

  canvas.addEventListener('mousedown',onStart);
  canvas.addEventListener('mousemove',onMove);
  canvas.addEventListener('mouseup',onEnd);
  canvas.addEventListener('touchstart',onStart,{passive:false});
  canvas.addEventListener('touchmove',onMove,{passive:false});
  canvas.addEventListener('touchend',onEnd,{passive:false});

  document.getElementById('crop-confirm').onclick=async()=>{
    const x=Math.min(drag.sx,drag.ex),y=Math.min(drag.sy,drag.ey);
    const w=Math.abs(drag.ex-drag.sx),h=Math.abs(drag.ey-drag.sy);
    // Build rotated full canvas then crop
    const tmp=document.createElement('canvas');
    tmp.width=canvas.width;tmp.height=canvas.height;
    drawRotated(tmp.getContext('2d'));
    // Upscale 2x for better OCR
    const cropCanvas=document.createElement('canvas');
    cropCanvas.width=w*2;cropCanvas.height=h*2;
    cropCanvas.getContext('2d').drawImage(tmp,x,y,w,h,0,0,w*2,h*2);
    preprocessForOCR(cropCanvas);
    overlay.remove();
    await runOCROnCanvas(cropCanvas,imgUrl,file);
  };
}

function preprocessForOCR(canvas){
  const ctx=canvas.getContext('2d');
  const id=ctx.getImageData(0,0,canvas.width,canvas.height);
  const d=id.data;
  for(let i=0;i<d.length;i+=4){
    const gray=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    const factor=1.8; // contrast
    const boosted=factor*(gray-128)+128;
    const v=Math.max(0,Math.min(255,boosted));
    d[i]=d[i+1]=d[i+2]=v;
  }
  ctx.putImageData(id,0,0);
}

async function runOCROnCanvas(cropCanvas,imgUrl,file){
  const mb=document.getElementById('modalBody');mb.style.maxWidth='420px';
  openModal(`<div style="text-align:center;padding:30px 20px">
    <div style="font-size:48px;margin-bottom:16px">🔍</div>
    <h2 class="cm-form-title" style="margin-bottom:8px">Reading Receipt...</h2>
    <p style="font-size:13px;color:var(--text3);margin-bottom:20px">Analyzing your receipt with AI.</p>
    <div style="height:6px;background:var(--border2);border-radius:4px;overflow:hidden">
      <div id="ocr-progress" style="height:100%;background:var(--accent);border-radius:4px;width:0%;transition:width 0.3s ease"></div>
    </div>
    <div id="ocr-status" style="font-size:12px;color:var(--text4);margin-top:8px">Sending to Claude AI...</div>
  </div>`);

  const setProgress=(pct,msg)=>{
    const el=document.getElementById('ocr-progress');
    const s=document.getElementById('ocr-status');
    if(el)el.style.width=pct+'%';
    if(s)s.textContent=msg;
  };

  // Try Claude Vision first
  let claudeErrorMsg=null;
  try{
    setProgress(20,'Sending to Claude AI...');
    // Convert canvas to base64 JPEG
    const base64=cropCanvas.toDataURL('image/jpeg',0.9).split(',')[1];
    setProgress(40,'Analyzing receipt...');

    const resp=await fetch('https://crafty-receipt.tymckinney2222.workers.dev',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({imageBase64:base64,mediaType:'image/jpeg'})
    });

    if(!resp.ok){
      let body='';
      try{body=await resp.text();}catch(e){}
      throw new Error('Worker returned HTTP '+resp.status+(body?' — '+body.slice(0,300):''));
    }
    const result=await resp.json();
    if(!result.success||!result.data){
      throw new Error('Worker responded but payload was invalid: '+JSON.stringify(result).slice(0,300));
    }

    setProgress(90,'Processing results...');
    const d=result.data;

    // Build parsed object from Claude's structured response
    const parsed={
      storeName:d.storeName||'',
      date:d.date||todayStr(),
      items:(d.items||[]).map(i=>({
        id:uid(),
        name:i.name||'Item',
        price:Number(i.price||0).toFixed(2),
        checked:true,
        category:getExpenseCats()[0]
      })),
      rawText:JSON.stringify(d,null,2),
      scanMethod:'claude'
    };

    // Fallback if Claude returned no items
    if(!parsed.items.length)throw new Error('No items found');

    setProgress(100,'Done!');
    await new Promise(r=>setTimeout(r,300));
    closeModal();
    showToast('✨ Scanned with Claude AI','var(--green)');
    showReceiptReview(parsed,file,imgUrl);
    return;

  }catch(err){
    console.warn('Claude Vision failed, falling back to Tesseract:',err);
    claudeErrorMsg=(err&&err.message)?err.message:String(err);
    setProgress(0,'Falling back to on-device OCR...');
  }

  // Fallback — Tesseract on-device OCR
  try{
    if(!window.Tesseract){
      setProgress(10,'Loading OCR engine...');
      await new Promise((resolve,reject)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js';
        s.onload=resolve;s.onerror=reject;
        document.head.appendChild(s);
      });
    }
    setProgress(20,'Analyzing text...');
    const blob=await new Promise(r=>cropCanvas.toBlob(r,'image/png'));
    const result=await Tesseract.recognize(blob,'eng',{
      logger:m=>{
        if(m.status==='recognizing text'){
          const p=Math.round(m.progress*70+20);
          setProgress(p,`Reading... ${Math.round(m.progress*100)}%`);
        }
      },
      tessedit_pageseg_mode:'6',
    });
    setProgress(100,'Done!');
    await new Promise(r=>setTimeout(r,300));
    closeModal();
    const parsed=parseReceiptText(result.data.text);
    parsed.scanMethod='tesseract';
    parsed.claudeError=claudeErrorMsg;
    showToast('📷 Fell back to on-device OCR','var(--accent)');
    showReceiptReview(parsed,file,imgUrl);
  }catch(err){
    console.error('OCR error:',err);
    closeModal();
    showToast('❌ Could not read receipt — try again','var(--red)');
    URL.revokeObjectURL(imgUrl);
  }
}

function parseReceiptText(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  let date=null,storeName=null;
  const items=[];

  // Find date
  for(const line of lines){
    const m=line.match(/\b(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})\b/)||
             line.match(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*\s+(\d{1,2}),?\s+(\d{4})\b/i);
    if(m){try{const d=new Date(m[0]);if(!isNaN(d.getTime())){date=d.toISOString().slice(0,10);break;}}catch{}}
  }

  // Find store name — first clean short line
  const skipStore=/receipt|invoice|thank|welcome|www\.|\.com|tel:|phone|cashier|#|reg|trans|\d{3}[-.\s]\d{3}/i;
  for(const line of lines){
    if(line.length>2&&line.length<50&&!skipStore.test(line)&&!/^\d+$/.test(line)&&!/^[.\s]+$/.test(line)){
      storeName=line;break;
    }
  }

  // Skip lines that are noise
  const skipItem=/total|subtotal|tax|tip|change|cash|credit|debit|visa|master|payment|balance|amount due|sale|discount|savings|reward|receipt|thank|store|address|phone|www\.|\.com/i;

  lines.forEach(line=>{
    // Match price anywhere in line — allows trailing tax codes like N, A, F, T, X, \
    // Walmart format: ITEM_NAME  UPC_CODE  F  PRICE  TAX_CODE
    const priceMatch=line.match(/\$?\s*(\d{1,4}[.,]\d{2})\s*[A-Z\\*]?\s*$/);
    if(!priceMatch)return;

    const price=parseFloat(priceMatch[1].replace(',','.'));
    if(price<=0||price>=5000)return;
    if(skipItem.test(line))return;

    // Extract name: take everything before the price match, strip UPCs and tax flags
    let name=line.slice(0,line.lastIndexOf(priceMatch[0])).trim();

    // Strip UPC-like numbers (8+ consecutive digits)
    name=name.replace(/\b\d{8,}\b/g,'').trim();

    // Strip single uppercase letters that are tax/flag codes (e.g. "F" between name and price)
    name=name.replace(/\s+[A-Z]\s*$/,'').trim();

    // Strip trailing special chars
    name=name.replace(/[*@#®©\\/]+/g,' ').replace(/\s+/g,' ').trim();

    // Skip if name is too short, all numbers, or looks like a barcode artifact
    if(name.length<2||/^\d+$/.test(name)||/^[.\s,]+$/.test(name))return;

    items.push({id:uid(),name,price:price.toFixed(2),checked:true});
  });

  // Fallback — use largest amount as single item
  if(!items.length){
    const allAmts=[];
    lines.forEach(l=>{
      const m=l.match(/\$?\s*(\d{1,4}[.,]\d{2})\b/g);
      if(m)m.forEach(v=>{const n=parseFloat(v.replace(/[$,]/g,''));if(n>0&&n<10000)allAmts.push(n);});
    });
    const amount=allAmts.length?Math.max(...allAmts):null;
    if(amount)items.push({id:uid(),name:storeName||'Purchase',price:amount.toFixed(2),checked:true});
  }

  return{items,date:date||todayStr(),storeName:storeName||'',rawText:text};
}

    showToast(`🗑️ Cleared: ${cleared.join(', ')}`, 'var(--red)');
  };
}
let _tt=null;
function showTooltip(el,text){
  hideTooltip();
  const tip=document.createElement('div');
  tip.className='cm-tooltip';
  tip.textContent=text;
  // Position off-screen first so we can measure before placing
  tip.style.left='-9999px';
  tip.style.top='0px';
  tip.style.transform='none';
  document.body.appendChild(tip);
  _tt=tip;
  const r=el.getBoundingClientRect();
  const tipW=tip.offsetWidth;
  const tipH=tip.offsetHeight;
  const pad=8;
  const vw=window.innerWidth;
  // Center horizontally on the element, then clamp to viewport
  let left=r.left+r.width/2-tipW/2;
  if(left<pad)left=pad;
  if(left+tipW>vw-pad)left=vw-pad-tipW;
  // Default above; flip below if not enough room above
  let top=r.top-tipH-8;
  if(top<4)top=r.bottom+8;
  tip.style.left=left+'px';
  tip.style.top=top+'px';
}
function hideTooltip(){if(_tt){_tt.remove();_tt=null;}}
function buildTrendChartSVG(months,maxVal){
  // Pick a "nice" Y-axis max so ticks land on round numbers
  function niceMax(v){
    if(v<=0)return 10;
    var p=Math.pow(10,Math.floor(Math.log10(v)));
    var n=v/p,nc;
    if(n<=1)nc=1;
    else if(n<=2)nc=2;
    else if(n<=2.5)nc=2.5;
    else if(n<=5)nc=5;
    else nc=10;
    return nc*p;
  }
  function fmtY(v){
    if(v>=1000)return '$'+(v/1000).toFixed(v>=10000?0:1)+'k';
    return '$'+Math.round(v);
  }
  var W=600,H=190,ML=44,MR=10,MT=10,MB=28;
  var plotW=W-ML-MR,plotH=H-MT-MB,baseY=MT+plotH;
  var mx=niceMax(maxVal),ticks=4,step=mx/ticks;
  var colW=plotW/months.length;
  var barW=Math.max(8,colW*0.32),gap=colW*0.06;
  var s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">';
  // Horizontal grid lines + Y-axis tick labels
  for(var i=0;i<=ticks;i++){
    var val=mx-step*i;
    var y=MT+(plotH/ticks)*i;
    var dash=(i===ticks)?'':'2,3';
    s+='<line x1="'+ML+'" y1="'+y+'" x2="'+(W-MR)+'" y2="'+y+'" stroke="var(--border)" stroke-width="1"'+(dash?' stroke-dasharray="'+dash+'"':'')+' opacity="'+(i===ticks?'1':'0.7')+'"/>';
    s+='<text x="'+(ML-6)+'" y="'+(y+3.5)+'" text-anchor="end" font-size="10" font-family="DM Sans,sans-serif" fill="var(--text3)">'+fmtY(val)+'</text>';
  }
  // Y-axis vertical line
  s+='<line x1="'+ML+'" y1="'+MT+'" x2="'+ML+'" y2="'+baseY+'" stroke="var(--text3)" stroke-width="1"/>';
  // Bars and X labels
  for(var j=0;j<months.length;j++){
    var m=months[j];
    var cx=ML+colW*j+colW/2;
    var rh=(m.rev/mx)*plotH;
    var eh=(m.exp/mx)*plotH;
    var rx=cx-barW-gap/2;
    var ex=cx+gap/2;
    if(rh>0)s+='<rect x="'+rx+'" y="'+(baseY-rh)+'" width="'+barW+'" height="'+rh+'" rx="1.5" fill="#8fbc8f" data-tip="'+m.short+' Revenue: '+fmt$(m.rev)+'" style="cursor:pointer"/>';
    if(eh>0)s+='<rect x="'+ex+'" y="'+(baseY-eh)+'" width="'+barW+'" height="'+eh+'" rx="1.5" fill="var(--accent)" data-tip="'+m.short+' Expenses: '+fmt$(m.exp)+'" style="cursor:pointer"/>';
    s+='<text x="'+cx+'" y="'+(H-10)+'" text-anchor="middle" font-size="11" font-family="DM Sans,sans-serif" fill="var(--text3)">'+m.short+'</text>';
  }
  s+='</svg>';
  return s;
}

function buildLineChartSVG(points,opts){
  opts=opts||{};
  var color=opts.color||'var(--accent)';
  var fmt=opts.fmtY||function(v){return String(Math.round(v));};
  var fmtTip=opts.fmtTip||fmt;
  // Nice-max helper (rounds up to a "nice" round number)
  function niceMax(v){
    if(v<=0)return 1;
    var p=Math.pow(10,Math.floor(Math.log10(v)));
    var n=v/p,nc;
    if(n<=1)nc=1;
    else if(n<=2)nc=2;
    else if(n<=2.5)nc=2.5;
    else if(n<=5)nc=5;
    else nc=10;
    return nc*p;
  }
  var vals=[];
  for(var i=0;i<points.length;i++){
    var v=points[i].value;
    if(v!==null&&v!==undefined&&!isNaN(v))vals.push(v);
  }
  if(!vals.length){
    return '<div style="text-align:center;padding:30px 10px;color:var(--text4);font-size:13px">Not enough data yet</div>';
  }
  var maxVal=Math.max.apply(null,vals);
  var minVal=Math.min.apply(null,vals);
  var mx,mn;
  if(minVal>=0){mn=0;mx=niceMax(Math.max(maxVal,1));}
  else if(maxVal<=0){mx=0;mn=-niceMax(Math.abs(minVal));}
  else{mx=niceMax(maxVal);mn=-niceMax(Math.abs(minVal));}
  var W=600,H=190,ML=46,MR=12,MT=14,MB=30;
  var plotW=W-ML-MR,plotH=H-MT-MB,baseY=MT+plotH;
  var ticks=4,range=mx-mn;
  function yCoord(val){return MT+plotH*(1-(val-mn)/range);}
  var s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">';
  // Grid lines + Y tick labels
  for(var i=0;i<=ticks;i++){
    var tv=mn+(range/ticks)*(ticks-i);
    var y=MT+(plotH/ticks)*i;
    var isZero=Math.abs(tv)<0.0001&&mn<0&&mx>0;
    var isBaseline=i===ticks;
    var strokeAttr=(isZero||isBaseline)?'stroke="var(--text3)" stroke-width="1"':'stroke="var(--border)" stroke-width="1" stroke-dasharray="2,3" opacity="0.7"';
    s+='<line x1="'+ML+'" y1="'+y+'" x2="'+(W-MR)+'" y2="'+y+'" '+strokeAttr+'/>';
    s+='<text x="'+(ML-6)+'" y="'+(y+3.5)+'" text-anchor="end" font-size="10" font-family="DM Sans,sans-serif" fill="var(--text3)">'+fmt(tv)+'</text>';
  }
  // Y-axis line
  s+='<line x1="'+ML+'" y1="'+MT+'" x2="'+ML+'" y2="'+baseY+'" stroke="var(--text3)" stroke-width="1"/>';
  // Coordinates
  var colW=plotW/points.length;
  var coords=[];
  for(var k=0;k<points.length;k++){
    var pv=points[k].value;
    var cx=ML+colW*k+colW/2;
    var cy=(pv!==null&&pv!==undefined&&!isNaN(pv))?yCoord(pv):null;
    coords.push({x:cx,y:cy,val:pv,short:points[k].short});
  }
  // Build line segments across non-null spans
  var segs=[],cur=[];
  for(var m=0;m<coords.length;m++){
    if(coords[m].y!==null)cur.push(coords[m]);
    else{if(cur.length>=2)segs.push(cur);cur=[];}
  }
  if(cur.length>=2)segs.push(cur);
  for(var n=0;n<segs.length;n++){
    var pts='';
    for(var q=0;q<segs[n].length;q++)pts+=(q?' ':'')+segs[n][q].x+','+segs[n][q].y;
    s+='<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>';
  }
  // Dots + X labels
  for(var r=0;r<coords.length;r++){
    var c=coords[r];
    if(c.y!==null){
      s+='<circle cx="'+c.x+'" cy="'+c.y+'" r="4" fill="'+color+'" stroke="var(--card)" stroke-width="1.5" data-tip="'+c.short+': '+fmtTip(c.val)+'" style="cursor:pointer"/>';
    }
    s+='<text x="'+c.x+'" y="'+(H-10)+'" text-anchor="middle" font-size="11" font-family="DM Sans,sans-serif" fill="var(--text3)">'+c.short+'</text>';
  }
  s+='</svg>';
  return s;
}

function attachBarTooltips(container){
  container.querySelectorAll('[data-tip]').forEach(el=>{
    el.addEventListener('mouseenter',()=>showTooltip(el,el.dataset.tip));
    el.addEventListener('mouseleave',hideTooltip);
    el.addEventListener('touchstart',e=>{e.preventDefault();showTooltip(el,el.dataset.tip);},{ passive:false});
    el.addEventListener('touchend',()=>setTimeout(hideTooltip,1500));
  });
}

document.getElementById('searchBtn').addEventListener('click',openGlobalSearch);

function openGlobalSearch(){
  const overlay=document.createElement('div');
  overlay.className='cm-search-overlay';

  overlay.innerHTML=`<div class="cm-search-box">
    <div class="cm-search-input-wrap">

function runGlobalSearch(q){
  const res=document.getElementById('gs-results');
  if(!q){res.innerHTML='<div style="text-align:center;padding:30px;color:var(--text4);font-size:14px">Start typing to search...</div>';return;}
  const ql=q.toLowerCase();
  const sections=[];

  // Orders
  const orders=S.orders.filter(o=>
    o.customer?.toLowerCase().includes(ql)||
    o.items?.toLowerCase().includes(ql)||
    o.notes?.toLowerCase().includes(ql)||
    o.tracking?.toLowerCase().includes(ql)||
    String(o.orderNum||'').includes(ql)
  ).slice(0,6);
  if(orders.length){
    sections.push(`<div class="cm-search-group-title">📋 Orders</div>`+
      orders.map(o=>`<div class="cm-search-result" onclick="document.getElementById('globalSearch').remove();switchTab('orders');setTimeout(()=>openOrderForm(S.orders.find(x=>x.id==='${o.id}')),100)">
        <div class="cm-search-result-icon">📋</div>
        <div class="cm-search-result-main">
          <div class="cm-search-result-title">${esc(o.customer)}${o.orderNum?` <span style="color:var(--text4);font-weight:400">#${o.orderNum}</span>`:''}</div>
          <div class="cm-search-result-sub">${esc(o.items||'No items')} · ${o.status}</div>
        </div>
        <div class="cm-search-result-right">${fmt$(o.price)}</div>
      </div>`).join(''));
  }

  // Expenses
  const expenses=S.expenses.filter(e=>
    e.description?.toLowerCase().includes(ql)||
    e.category?.toLowerCase().includes(ql)
  ).slice(0,4);
  if(expenses.length){
    sections.push(`<div class="cm-search-group-title">💰 Expenses</div>`+
      expenses.map(e=>`<div class="cm-search-result" onclick="document.getElementById('globalSearch').remove();switchTab('expenses')">
        <div class="cm-search-result-icon">💰</div>
        <div class="cm-search-result-main">
          <div class="cm-search-result-title">${esc(e.description||'—')}</div>
          <div class="cm-search-result-sub">${e.category} · ${fmtDate(e.date)}</div>
        </div>
        <div class="cm-search-result-right">${fmt$(e.amount)}</div>
      </div>`).join(''));
  }

  // Products
  const products=S.products.filter(p=>
    p.name?.toLowerCase().includes(ql)||
    p.category?.toLowerCase().includes(ql)
  ).slice(0,4);
  if(products.length){
    sections.push(`<div class="cm-search-group-title">🏷️ Products</div>`+
      products.map(p=>`<div class="cm-search-result" onclick="document.getElementById('globalSearch').remove();switchTab('products');setTimeout(()=>openProductForm(S.products.find(x=>x.id==='${p.id}')),100)">
        <div class="cm-search-result-icon">🏷️</div>
        <div class="cm-search-result-main">
          <div class="cm-search-result-title">${esc(p.name)}</div>
          <div class="cm-search-result-sub">${p.category}</div>
        </div>
        <div class="cm-search-result-right">${fmt$(p.basePrice)}</div>
      </div>`).join(''));
  }

  // Recipes
  const recipes=S.recipes.filter(r=>
    r.name?.toLowerCase().includes(ql)||
    r.ingredients?.some(i=>i.name?.toLowerCase().includes(ql))
  ).slice(0,4);
  if(recipes.length){
    sections.push(`<div class="cm-search-group-title">📐 Recipes</div>`+
      recipes.map(r=>`<div class="cm-search-result" onclick="document.getElementById('globalSearch').remove();switchTab('recipes');setTimeout(()=>openRecipeForm(S.recipes.find(x=>x.id==='${r.id}')),100)">
        <div class="cm-search-result-icon">📐</div>
        <div class="cm-search-result-main">
          <div class="cm-search-result-title">${esc(r.name)}</div>
          <div class="cm-search-result-sub">${r.baseYield} ${esc(r.yieldUnit)} · ${r.ingredients.length} ingredients</div>
        </div>
      </div>`).join(''));
  }

  // Supplies
  const supplies=(S.supplies||[]).filter(s=>
    s.name?.toLowerCase().includes(ql)||
    s.unit?.toLowerCase().includes(ql)
  ).slice(0,4);
  if(supplies.length){
    sections.push(`<div class="cm-search-group-title">🧪 Supplies</div>`+
      supplies.map(s=>`<div class="cm-search-result" onclick="document.getElementById('globalSearch').remove();switchTab('inventory');S.invTab='supplies';renderInventory()">
        <div class="cm-search-result-icon">🧪</div>
        <div class="cm-search-result-main">
          <div class="cm-search-result-title">${esc(s.name)}</div>
          <div class="cm-search-result-sub">${s.stock} ${esc(s.unit)} in stock</div>
        </div>
      </div>`).join(''));
  }

  if(!sections.length){
    res.innerHTML=`<div style="text-align:center;padding:30px;color:var(--text4);font-size:14px">No results for "<strong>${esc(q)}</strong>"</div>`;
  } else {
    res.innerHTML=sections.join('<div style="height:1px;background:var(--border2);margin:4px 0"></div>');
  }
}

function handleLogoUpload(input,type){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      // Logo: max 400px, Banner: max 1200x300
      let w=img.width,h=img.height;
      if(type==='logo'){
        const max=400;
        if(w>max||h>max){const s=Math.min(max/w,max/h);w=Math.round(w*s);h=Math.round(h*s);}
      } else {
        const maxW=1200,maxH=300;
        const s=Math.min(maxW/w,maxH/h,1);
        w=Math.round(w*s);h=Math.round(h*s);
      }
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const data=canvas.toDataURL('image/jpeg',0.85);
      try{localStorage.setItem(type==='logo'?'cp-logo':'cp-banner',data);}catch{showToast('Image too large — try a smaller file','var(--red)');return;}
      // Update preview
      const prev=document.getElementById(`bp-${type}-preview`);
      if(prev)prev.innerHTML=`<img src="${data}" style="width:100%;height:100%;object-fit:${type==='logo'?'contain':'cover'}">`;
      if(type==='logo')injectLogos();
      else renderTools();
      showToast(`✅ ${type==='logo'?'Logo':'Banner'} updated!`,'var(--green)');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function hideSplash(){
  var s=document.getElementById('cm-splash');
  if(!s)return;
  var p=document.getElementById('cm-splash-progress');
  if(p)p.style.width='100%';
  setTimeout(function(){
    s.classList.add('hide');
    setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s);},600);
  },2500);
}

let _fbApp=null,_fbAuth=null,_fbDb=null,_fbUser=null,_syncPending=false;

function initFirebase(){
  if(_fbApp)return;
  try{
    _fbApp=firebase.initializeApp(FB_CONFIG);
    _fbAuth=firebase.auth();
    _fbDb=firebase.firestore();
    _fbAuth.onAuthStateChanged(user=>{
      _fbUser=user;
      if(user){
        // Signed in
        document.getElementById('cm-signed-out').style.display='none';
        document.getElementById('cm-signed-in').style.display='flex';
        document.getElementById('cm-user-name').textContent=user.displayName||user.email;
        const av=document.getElementById('cm-user-avatar');
        if(user.photoURL)av.src=user.photoURL;else av.src='';
        setSyncStatus('☁️ Syncing...');
        pullFromCloud().then(()=>setSyncStatus('☁️ Synced'));
      } else {
        // Signed out
        document.getElementById('cm-signed-out').style.display='flex';
        document.getElementById('cm-signed-in').style.display='none';
      }
    });
  }catch(e){console.error('Firebase init failed:',e);}
}

function setSyncStatus(msg){
  const el=document.getElementById('cm-sync-status');
  if(el)el.textContent=msg;
}

// Pull all data from Firestore → localStorage → S
async function pullFromCloud(){
  if(!_fbUser||!_fbDb)return;
  try{
    const uid=_fbUser.uid;
    const collections=['orders','expenses','products','recipes','supplies'];
    for(const col of collections){
      const snap=await _fbDb.collection('users').doc(uid).collection(col).get();
      if(!snap.empty){
        const data=snap.docs.map(d=>d.data());
        S[col]=data;
        try{localStorage.setItem(KEYS[col],JSON.stringify(data));}catch{}
      }
    }
    // Pull profile
    const profileDoc=await _fbDb.collection('users').doc(uid).get();
    if(profileDoc.exists){
      const p=profileDoc.data().profile;
      if(p)try{localStorage.setItem(PROFILE_KEY,JSON.stringify(p));}catch{}
    }
    render();
    applyProfile();
  }catch(e){
    console.error('Pull failed:',e);
    setSyncStatus('⚠️ Sync error');
  }
}

// Push one collection to Firestore
async function pushToCloud(colName){
  if(!_fbUser||!_fbDb)return;
  try{
    setSyncStatus('☁️ Saving...');
    const uid=_fbUser.uid;
    const col=_fbDb.collection('users').doc(uid).collection(colName);
    const batch=_fbDb.batch();
    // Delete all existing docs then rewrite — simple but reliable
    const existing=await col.get();
    existing.docs.forEach(d=>batch.delete(d.ref));
    S[colName].forEach(item=>{
      const ref=col.doc(item.id||_fbDb.collection('_').doc().id);
      batch.set(ref,item);
    });
    await batch.commit();
    setSyncStatus('☁️ Synced');
  }catch(e){
    console.error('Push failed:',e);
    setSyncStatus('⚠️ Sync error');
  }
}

// Push profile to Firestore
async function pushProfileToCloud(){
  if(!_fbUser||!_fbDb)return;
  try{
    const p=getProfile();
    await _fbDb.collection('users').doc(_fbUser.uid).set({profile:p},{merge:true});
  }catch(e){console.error('Profile push failed:',e);}
}

// Override save() to also push to cloud
const _origSave=save;
save=async function(k){
  _origSave(k);
  if(_fbUser&&_fbDb&&KEYS[k]){
    await pushToCloud(k);
  }
};

// Override saveProfile to also push to cloud
const _origSaveProfile=saveProfile;
saveProfile=function(p){
  _origSaveProfile(p);
  pushProfileToCloud();
};

/* ── App update notification ── */
function checkForAppUpdate(){
  const LAST_KEY='cp-last-seen-version';
  let lastSeen=null;
  try{lastSeen=localStorage.getItem(LAST_KEY);}catch(e){}
  // First-time user — just record current version silently
  if(!lastSeen){
    try{localStorage.setItem(LAST_KEY,APP_VERSION);}catch(e){}
    return;
  }
  // Same version — nothing to show
  if(lastSeen===APP_VERSION)return;
  // New version — show a dismissible bottom banner
  showUpdateBanner(lastSeen);
}
function showUpdateBanner(fromVersion){
  // Remove any existing banner
  const existing=document.getElementById('cpUpdateBanner');
  if(existing)existing.remove();
  const b=document.createElement('div');
  b.id='cpUpdateBanner';
  b.className='cm-update-banner';
  b.innerHTML=`<span style="font-size:16px;flex-shrink:0">✨</span>
    <span class="cm-update-banner-text"><strong>Crafty Planner updated</strong> — tap to see what's new</span>
    <button class="cm-update-banner-close" aria-label="Dismiss" type="button">✕</button>`;
  b.addEventListener('click',e=>{
    if(e.target.classList.contains('cm-update-banner-close'))return;
    showChangelogModal(fromVersion);
    b.remove();
  });
  b.querySelector('.cm-update-banner-close').addEventListener('click',e=>{
    e.stopPropagation();
    b.remove();
    // Dismissal does NOT update localStorage — user will see banner again next open
    // until they actually view the changelog
  });
  document.body.appendChild(b);
}
function showChangelogModal(fromVersion){
  const mb=document.getElementById('modalBody');
  if(mb)mb.style.maxWidth='500px';
  // Collect all versions newer than fromVersion (keys are sortable strings like "2026.04.18.1")
  const allVersions=Object.keys(CHANGELOG).sort().reverse();
  const newVersions=allVersions.filter(v=>v>fromVersion);
  const shown=newVersions.length?newVersions:[APP_VERSION];
  const body=shown.map(v=>{
    const entry=CHANGELOG[v];
    if(!entry)return '';
    const items=(entry.entries||[]).map(e=>`<li style="margin-bottom:8px;line-height:1.5">${e}</li>`).join('');
    return `<div style="margin-bottom:18px">
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border2)">
        <span style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--accent)">v${v}</span>
        ${entry.date?`<span style="font-size:12px;color:var(--text4)">${entry.date}</span>`:''}
      </div>
      <ul style="font-size:14px;color:var(--text2);padding-left:20px;margin:0">${items}</ul>
    </div>`;
  }).join('');
  openModal(`<h2 class="cm-form-title">🎉 What's New</h2>
    <p style="font-size:13px;color:var(--text3);margin-bottom:16px">Here's everything that's changed since you were last here.</p>
    <div style="max-height:52vh;overflow-y:auto;padding-right:4px">${body}</div>
    <div class="cm-form-actions" style="margin-top:14px">
      <button class="cm-save-btn" id="cpChangelogOk" style="flex:1">Got it 👍</button>
    </div>`);
  document.getElementById('cpChangelogOk').onclick=()=>{
    try{localStorage.setItem('cp-last-seen-version',APP_VERSION);}catch(e){}
    closeModal();
  };
}
